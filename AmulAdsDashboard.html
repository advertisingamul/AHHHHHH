<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amul Campaign Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #070B14;
      --card: #0D1526;
      --border: #18253F;
      --red: #A8001A;
      --gold: #F5A623;
      --teal: #00C9A7;
      --amber: #B8860B;
      --blue: #1877F2;
      --pink: #E1306C;
      --text: #EEF2FF;
      --text-sec: #8A9CC0;
      --text-dim: #6B7FA3;
      --header: #090E1C;
      --hover: #111E38;
      --shadow: 0 24px 64px rgba(0, 0, 0, 0.34);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    html, body, #root {
      min-height: 100%;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(245, 166, 35, 0.08), transparent 24%),
        radial-gradient(circle at top right, rgba(0, 201, 167, 0.07), transparent 30%),
        linear-gradient(180deg, #09111d 0%, var(--bg) 100%);
      color: var(--text);
      font-family: "IBM Plex Sans", sans-serif;
      overflow-x: hidden;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app-shell {
      min-height: 100vh;
      padding: 24px;
    }

    .dashboard-shell {
      max-width: 1480px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .header {
      background: var(--header);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px 16px 12px;
      display: grid;
      gap: 12px;
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 40;
      backdrop-filter: blur(10px);
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-title {
      font-family: "Syne", sans-serif;
      font-weight: 800;
      font-size: 26px;
      color: var(--red);
      letter-spacing: -0.04em;
    }

    .brand-logo {
      height: 30px;
      width: auto;
      display: block;
      flex: 0 0 auto;
    }

    .brand-divider,
    .brand-sub {
      color: var(--text-sec);
      font-size: 14px;
    }

    .subtle-button {
      border: 1px solid var(--border);
      background: #18253F;
      color: var(--text-sec);
      font-size: 12px;
      padding: 8px 12px;
      border-radius: 999px;
    }

    .month-row,
    .tab-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .date-filter-row {
      display: inline-flex;
      align-items: flex-end;
      gap: 10px;
      flex-wrap: wrap;
      margin-left: auto;
    }

    .date-filter-shell {
      display: grid;
      gap: 6px;
      justify-items: end;
      margin-left: auto;
    }

    .date-filter-field {
      display: grid;
      gap: 4px;
      min-width: 122px;
    }

    .date-filter-input {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 12px;
      min-width: 122px;
    }

    .date-filter-input:focus {
      outline: none;
      border-color: var(--gold);
    }

    .date-filter-clear {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-sec);
      font-size: 12px;
      padding: 7px 11px;
      border-radius: 999px;
    }

    .date-filter-error {
      font-size: 11px;
      color: #DBB46B;
      text-align: right;
      max-width: 360px;
      line-height: 1.35;
    }

    .festival-toggle {
      border: 1px solid var(--border);
      background: rgba(17, 30, 56, 0.72);
      color: var(--text-sec);
      font-size: 12px;
      padding: 7px 11px;
      border-radius: 999px;
      cursor: pointer;
      transition: opacity 140ms ease, border-color 140ms ease, color 140ms ease;
    }

    .festival-toggle.active {
      color: var(--teal);
      border-color: rgba(0, 201, 167, 0.35);
    }

    .festival-toggle.inactive {
      opacity: 0.55;
    }

    .month-pill,
    .tab-pill,
    .metric-pill,
    .filter-chip,
    .status-pill,
    .scope-pill {
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .month-pill {
      padding: 7px 11px;
      color: var(--text-dim);
      font-size: 12px;
    }

    .month-pill.active {
      border-color: var(--gold);
      color: var(--gold);
    }

    .ungtagged {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--amber);
      font-size: 12px;
      margin-left: 8px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--amber);
      flex: 0 0 auto;
    }

    .tab-pill {
      padding: 9px 14px;
      color: var(--text-sec);
      font-family: "Syne", sans-serif;
      font-size: 14px;
      border-color: transparent;
      transition: background 140ms ease;
    }

    .tab-pill:hover {
      background: var(--hover);
    }

    .tab-pill.active {
      background: var(--red);
      color: #fff;
    }

    .card,
    .modal-card,
    .side-panel,
    .placeholder-card,
    .table-shell,
    .note-block {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .overview-grid {
      display: grid;
      gap: 16px;
    }

    .overview-row-1,
    .overview-row-2 {
      display: grid;
      gap: 16px;
      margin-bottom: 16px;
    }

    .overview-row-1 {
      grid-template-columns: 1fr 1fr;
    }

    .overview-row-2 {
      grid-template-columns: 1fr 1fr 1fr 1fr;
    }

    .stat-card {
      padding: 24px;
      min-height: 180px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      align-items: flex-start;
      text-align: left;
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
    }

    .spend-stat-card {
      padding: 24px;
      min-height: 186px;
      display: grid;
      grid-template-rows: auto auto auto 1fr auto;
      gap: 10px;
      align-items: start;
      text-align: left;
    }

    .large-stat-card {
      min-height: 180px;
    }

    .small-stat-card {
      min-height: 150px;
    }

    .spend-main-row {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(120px, 0.7fr);
      gap: 14px;
      align-items: start;
    }

    .spend-budget-block {
      display: grid;
      gap: 4px;
      justify-items: start;
      text-align: left;
    }

    .spend-budget-value {
      font-family: "DM Sans", sans-serif;
      font-weight: 500;
      font-size: 24px;
      line-height: 1;
      color: var(--text);
      letter-spacing: -0.03em;
    }

    .spend-supporting {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.45;
    }

    .spend-caution {
      font-size: 12px;
      color: var(--amber);
      line-height: 1.45;
    }

    .spend-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: auto;
    }

    .campaigns-stat-card {
      padding: 24px;
      min-height: 180px;
      display: grid;
      grid-template-rows: auto auto 1fr auto auto;
      gap: 10px;
      align-items: start;
      text-align: left;
    }

    .campaigns-main-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 16px;
      width: 100%;
      align-items: start;
    }

    .campaigns-col {
      display: grid;
      gap: 6px;
      align-items: start;
      justify-items: start;
      text-align: left;
    }

    .campaign-types-copy {
      font-size: 12px;
      color: var(--text-sec);
      line-height: 1.45;
      word-break: break-word;
    }

    .campaigns-pills-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      width: 100%;
    }

    .campaigns-warning {
      font-size: 12px;
      color: var(--amber);
      line-height: 1.45;
      word-break: break-word;
    }

    .stat-card.clickable:hover,
    .creative-card:hover,
    .date-row:hover,
    .table-row-hover:hover {
      transform: translateY(-1px);
      border-color: #2a3b5c;
      background: linear-gradient(180deg, rgba(17, 30, 56, 0.36), rgba(13, 21, 38, 1));
    }

    .card-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-sec);
    }

    .label-block {
      display: grid;
      gap: 0;
      align-items: start;
      text-align: left;
      min-width: 0;
    }

    .card-descriptor {
      font-size: 12px;
      font-style: italic;
      color: var(--text-dim);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .metric-descriptor {
      display: none;
    }

    .primary-value {
      font-family: "DM Sans", sans-serif;
      font-weight: 700;
      line-height: 1;
      color: var(--gold);
      font-size: 32px;
      letter-spacing: -0.04em;
      word-break: break-word;
    }

    .primary-value.medium {
      font-size: 24px;
    }

    .primary-value.small {
      font-size: 20px;
    }

    .supporting {
      font-size: 13px;
      color: var(--text-sec);
      line-height: 1.45;
    }

    .supporting.dim {
      color: var(--text-dim);
      font-size: 11px;
    }

    .pills-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .metric-pill {
      padding: 5px 9px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text);
      border-color: transparent;
      white-space: normal;
      text-align: left;
    }

    .metric-pill.positive {
      background: rgba(0, 201, 167, 0.14);
      color: var(--teal);
    }

    .metric-pill.negative {
      background: rgba(184, 134, 11, 0.16);
      color: #DBB46B;
    }

    .metric-pill.critical {
      background: rgba(168, 0, 26, 0.16);
      color: #FF7A8F;
    }

    .metric-pill.neutral {
      background: rgba(138, 156, 192, 0.14);
      color: var(--text-sec);
    }

    .metric-pill.neutral {
      background: rgba(24, 37, 63, 1);
      color: var(--text-sec);
    }

    .tap-link {
      margin-top: auto;
      color: var(--text-dim);
      font-size: 11px;
      font-style: italic;
    }

    .creative-card,
    .activity-card,
    .placeholder-card,
    .table-shell,
    .benchmarks-shell {
      padding: 18px;
    }

    .creative-card {
      padding: 24px;
      min-height: 150px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      align-items: start;
      transition: transform 140ms ease, border-color 140ms ease;
      text-align: left;
    }

    .creative-left {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .creative-supporting {
      font-size: 12px;
      color: var(--text-sec);
      line-height: 1.45;
    }

    .creative-footer {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      margin-top: auto;
    }

    .creative-note-right {
      text-align: right;
      margin-left: auto;
    }

    .creative-topline {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
    }

    .creative-helper-link {
      background: transparent;
      border: 0;
      padding: 0;
      color: var(--text-dim);
      font-size: 11px;
      text-decoration: none;
      cursor: pointer;
    }

    .creative-helper-link:hover {
      text-decoration: underline;
    }

    .creative-headline {
      font-family: "DM Sans", sans-serif;
      font-size: 30px;
      font-weight: 700;
      color: var(--gold);
      word-break: break-word;
    }

    .missed-card {
      padding: 24px;
      min-height: 150px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      align-items: start;
      text-align: left;
      transition: transform 140ms ease, border-color 140ms ease;
    }

    .missed-topline {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
    }

    .missed-supporting {
      font-size: 13px;
      color: var(--text-sec);
      line-height: 1.45;
    }

    .missed-note {
      color: var(--amber);
      font-size: 13px;
      line-height: 1.45;
    }

    .activity-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .section-title {
      font-family: "Syne", sans-serif;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .section-kicker {
      color: var(--text-dim);
      font-size: 11px;
      font-style: italic;
    }

    .chart-wrap {
      position: relative;
      min-height: 280px;
    }

    .chart-wrap.tall {
      min-height: 300px;
      height: 300px;
      max-height: 300px;
    }

    .chart-wrap.short {
      min-height: 220px;
    }

    .chart-wrap canvas {
      width: 100% !important;
      height: 100% !important;
    }

    .activity-footer {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 14px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .link-note {
      color: var(--text-dim);
      font-size: 11px;
      cursor: pointer;
    }

    .platforms-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(0, 1fr));
      gap: 16px;
    }

    .platform-card {
      padding: 24px;
      min-height: 420px;
      display: grid;
      grid-template-rows: auto auto auto auto auto 1fr auto;
      gap: 12px;
      align-items: start;
      text-align: left;
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
    }

    .platform-card:hover {
      transform: translateY(-1px);
      border-color: #2E3F60;
      background: linear-gradient(180deg, rgba(17, 30, 56, 0.36), rgba(13, 21, 38, 1));
    }

    .platform-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-sec);
    }

    .platform-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex: 0 0 auto;
    }

    .platform-spend-copy {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.4;
    }

    .platform-metrics-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      width: 100%;
    }

    .platform-metric-box {
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(13, 21, 38, 0.78);
      display: grid;
      gap: 6px;
    }

    .platform-metric-value {
      font-family: "DM Sans", sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    .platform-metric-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-sec);
    }

    .platform-change-block {
      display: grid;
      gap: 8px;
      width: 100%;
      align-self: stretch;
    }

    .platform-change-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-sec);
    }

    .platform-change-list {
      display: grid;
      gap: 6px;
    }

    .platform-change-row {
      display: grid;
      grid-template-columns: 70px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      font-size: 12px;
      color: var(--text);
    }

    .platform-change-metric {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-sec);
    }

    .platform-change-value {
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 12px;
      line-height: 1.4;
      word-break: break-word;
    }

    .platform-change-value.teal {
      color: var(--teal);
    }

    .platform-change-value.amber {
      color: #DBB46B;
    }

    .platform-change-value.red {
      color: #FF7A8F;
    }

    .pages-shell {
      display: grid;
      gap: 18px;
    }

    .pages-overview-card {
      min-height: 0;
      padding: 10px 18px;
      display: flex;
      justify-content: space-evenly;
      align-items: center;
      gap: 12px;
      text-align: left;
      border-bottom: 1px solid rgba(24, 37, 63, 0.95);
    }

    .pages-overview-item {
      flex: 1 1 0;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .pages-overview-item.tight {
      gap: 6px;
    }

    .pages-overview-kicker {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-sec);
    }

    .pages-overview-copy {
      font-size: 11px;
      font-style: italic;
      color: var(--text-dim);
      line-height: 1.35;
    }

    .pages-overview-value {
      font-family: "DM Sans", sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      line-height: 1.1;
      color: var(--text);
    }

    .pages-overview-value.gold {
      color: var(--gold);
    }

    .pages-overview-meta {
      font-size: 11px;
      color: var(--text-dim);
      line-height: 1.35;
    }

    .pages-overview-link {
      font-size: 12px;
      color: var(--text-sec);
      font-style: italic;
    }

    .pages-overview-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    .chart-subnote {
      font-size: 11px;
      font-style: italic;
      color: var(--text-dim);
      line-height: 1.35;
      margin-top: 6px;
    }

    .page-section {
      display: grid;
    }

    .page-wide-card {
      padding: 10px 18px;
      display: grid;
      gap: 0;
      align-items: stretch;
    }

    .page-card-header {
      padding: 8px 0;
      border-bottom: 1px solid rgba(24, 37, 63, 0.9);
      text-align: left;
    }

    .page-card-titleline {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      line-height: 1.35;
    }

    .page-card-name {
      font-family: "Syne", sans-serif;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .page-card-count,
    .page-card-subtitle,
    .page-card-separator {
      font-size: 12px;
      color: var(--text-dim);
    }

    .page-card-strip {
      display: flex;
      justify-content: space-evenly;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
    }

    .page-card-metric {
      flex: 1 1 0;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
      align-items: center;
      text-align: center;
    }

    .page-card-metric-value {
      font-family: "DM Sans", sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      line-height: 1.1;
      color: var(--text);
    }

    .page-card-metric-value.gold {
      color: var(--gold);
    }

    .page-card-metric-label {
      font-size: 11px;
      color: var(--text-dim);
      line-height: 1.35;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .page-card-footer {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;

    function titleCase(value) {
      return String(value || '')

        .split(/[\s/-]+/)
        .filter(Boolean)
        .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
        .join(' ');

    function coerceNumber(value) {
      if (typeof value === 'number') return Number.isFinite(value) ? value : 0;
      if (!value) return 0;
      const cleaned = String(value).replace(/,/g, '').replace(/[^\d.-]/g, '');
      const num = Number(cleaned);
      return Number.isFinite(num) ? num : 0;
    }

    function excelToDate(value) {
      if (!value && value !== 0) return null;
      if (value instanceof Date && !Number.isNaN(value.getTime())) return value;
      if (typeof value === 'number') {
        const parsed = XLSX.SSF.parse_date_code(value);
        if (parsed) return new Date(parsed.y, parsed.m - 1, parsed.d);
      }
      const direct = new Date(value);

    function valuesMap(row) {
      const map = {};
      Object.entries(row).forEach(([key, value]) => {
        map[normalizeKey(key)] = value;

      for (const key of keys) {
        const value = rowMap[normalizeKey(key)];

      const n = String(value || '').toLowerCase();
      if (n.includes('traffic')) return 'Traffic';

    function parseMonthFromFilename(filename) {
      const match = filename.match(/((?:jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*)[-_\s'.]?(\d{2,4})/i);
      if (!match) return null;
      const month = monthLookup[match[1].slice(0, 3).toLowerCase()];
      if (month == null) return null;
      let year = Number(match[2]);
      if (year < 100) year += 2000;
      return new Date(year, month, 1);
    }

    function detectReportingPeriod(sheet, filename) {
      const rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });
      for (const row of rows) {
        const map = valuesMap(row);
        const start = excelToDate(rowValue(map, ['reporting starts']));
        const end = excelToDate(rowValue(map, ['reporting ends']));
        if (end) return new Date(end.getFullYear(), end.getMonth(), 1);
        if (start) return new Date(start.getFullYear(), start.getMonth(), 1);
      }
      return parseMonthFromFilename(filename) || new Date();

    function getWorksheetByName(workbook, name) {
      const exact = workbook.Sheets[name];
      if (exact) return exact;
      const match = workbook.SheetNames.find((sheetName) => normalizeKey(sheetName) === normalizeKey(name));
      return match ? workbook.Sheets[match] : null;

    function validateRequiredColumns(sheet) {

      const validation = validateRequiredColumns(sheet);
      if (!validation.ok) {
        throw new Error(`${filename}: Missing required columns in "${REQUIRED_UPLOAD_SHEET}" — ${validation.missing.join(', ')}`);

      return sheet;

    function isValidCalendarDate(year, month, day) {
      const d = new Date(year, month, day);
      return d.getFullYear() === year && d.getMonth() === month && d.getDate() === day;
    }

    function normalizeYear(rawYear) {
      const year = Number(rawYear);
      return year < 100 ? year + 2000 : year;
    }

    function extractPostingDate(name) {
      const str = String(name || '');
      const mon = '(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)';
      const candidates = [
        // 15th Jun 2026 / 15th_Jun_2026 / 15thJune'26
        { regex: new RegExp(`(\\d{1,2})(?:st|nd|rd|th)[\\s_]*${mon}[a-z]*['\\s._-]?(\\d{2,4})`, 'i'),
          parse: (m) => ({ day: Number(m[1]), month: monthLookup[m[2].toLowerCase()], year: normalizeYear(m[3]) }) },
        // 15_Jun_2026 / 15-Jun-2026 / 15 Jun 2026
        { regex: new RegExp(`(\\d{1,2})[\\s_.-]+${mon}[a-z]*[\\s_.,-]+(\\d{2,4})`, 'i'),
          parse: (m) => ({ day: Number(m[1]), month: monthLookup[m[2].toLowerCase()], year: normalizeYear(m[3]) }) },
        // Jun 15 2026 / Jun_15_2026 / Jun 15th, 2026
        { regex: new RegExp(`${mon}[a-z]*[\\s_.-]+(\\d{1,2})(?:st|nd|rd|th)?[\\s_.,-]+(\\d{2,4})`, 'i'),
          parse: (m) => ({ day: Number(m[2]), month: monthLookup[m[1].toLowerCase()], year: normalizeYear(m[3]) }) },
        // 2026-06-15 (ISO, year-month-day) — checked before the day-first pattern below
        // so a 4-digit leading year is never misread as a 2-digit day
        { regex: /(\d{4})[/.-](\d{1,2})[/.-](\d{1,2})/,
          parse: (m) => ({ day: Number(m[3]), month: Number(m[2]) - 1, year: Number(m[1]) }) },
        // 15/06/2026, 15.06.26, or 13-06-2026 (numeric, day-first / Indian format)
        { regex: /(\d{1,2})[/.-](\d{1,2})[/.-](\d{2,4})/,
          parse: (m) => ({ day: Number(m[1]), month: Number(m[2]) - 1, year: normalizeYear(m[3]) }) }
      ];

      for (const { regex, parse } of candidates) {
        const match = regex.exec(str);
        if (!match) continue;
        const { day, month, year } = parse(match);
        if (month == null || month < 0 || month > 11) continue;
        if (!isValidCalendarDate(year, month, day)) continue;
        return new Date(year, month, day);
      }
      return null;
    }

    function parseCampaign(name, metaPlatform) {
      const n = String(name || '').toUpperCase();
      const parts = String(name || '').split('_');
      let platform = 'Combined/Auto';
      let platformFromMeta = false;
      if (n.includes('_FB_')) platform = 'Facebook';
      else if (n.includes('_IG_')) platform = 'Instagram';
      else if (String(metaPlatform).toLowerCase().includes('facebook')) {
        platform = 'Facebook';
        platformFromMeta = true;
      } else if (String(metaPlatform).toLowerCase().includes('instagram')) {
        platform = 'Instagram';
        platformFromMeta = true;
      }

      let type = '';
      const typeCandidate = parts[1]?.trim();
      const invalidPatterns = /^\d+$|^(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)|^\d{2,4}th|^fb$|^ig$/i;
      if (typeCandidate && !invalidPatterns.test(typeCandidate)) type = titleCase(typeCandidate);
      if (!type) {
        if (n.includes('_TOPICAL_')) type = 'Topical';
        else if (n.includes('_LIVE_')) type = 'Live Video';
        else if (n.includes('_IPL_')) type = 'IPL';
        else if (n.includes('_SCOOPING_')) type = 'Scooping';
        else if (n.includes('_BRAND_')) type = 'Brand';
        else type = 'Untagged';
      }

      let format = '';
      const formatCandidate = parts[3]?.trim();
      const validFormats = ['static', 'video', 'carousel', 'reel', 'post'];
      if (formatCandidate && validFormats.includes(formatCandidate.toLowerCase())) format = formatCandidate.toLowerCase() === 'post' ? 'Static' : titleCase(formatCandidate);
      if (!format) {
        if (type === 'Live Video') format = 'Video';
        else if (n.includes('_REEL_') || n.startsWith('REEL_')) format = 'Reel';
        else if (n.includes('_VIDEO_')) format = 'Video';
        else if (n.includes('_CAROUSEL_')) format = 'Carousel';
        else if (n.includes('_STATIC_')) format = 'Static';
        else if (n.includes('_POST_')) format = 'Static';
        else if (type === 'Scooping') format = 'Static';
        else format = 'Untagged';
      }

      const date = extractPostingDate(name);

      return { platform, platformFromMeta, type, format, date };
    }

    function calculateCampaign(row, idx) {
      const { platform, platformFromMeta, type, format, date } = parseCampaign(row.name, row.metaPlatform);
      const budget = row.budget > 0 ? row.budget : row.spend;
      const budgetUtil = budget > 0 ? (row.spend / budget) * 100 : 100;
      const nonClickEng = Math.max((row.engagements || 0) - (row.clicks || 0), 0);
      const nonClickEngRate = row.reach > 0 ? (nonClickEng / row.reach) * 100 : 0;
      const hasVideoMetricData = hasAnyVideoMetrics(row);
      const videoType = detectVideoType({ ...row, format });
      return {
        ...row,
        id: `${normalizeKey(row.name).replace(/[^a-z0-9]+/g, '-')}-${idx}`,
        platform,
        platformFromMeta,
        type,
        format,
        date,
        reportingStart: row.reportingStart,
        reportingEnd: row.reportingEnd,
        budget,
        budgetUtil,
        ctr: row.impressions > 0 ? (row.clicks / row.impressions) * 100 : 0,
        cpm: row.impressions > 0 ? (row.spend / row.impressions) * 1000 : 0,
        cpc: row.clicks > 0 ? row.spend / row.clicks : 0,
        cpe: row.engagements > 0 ? row.spend / row.engagements : 0,
        engRate: row.reach > 0 ? (row.engagements / row.reach) * 100 : 0,
        nonClickEng,
        nonClickEngRate,
        cpr: row.reach > 0 ? row.spend / row.reach : 0,
        hasVideo: row.v3s > 0,
        hasAnyVideoMetrics: hasVideoMetricData,
        videoType,
        isShortVideo: videoType === 'short',
        isStandardVideo: isStandardVideo({ ...row, format }),
        videoClassificationTag: getVideoClassificationTag({ ...row, format, isShortVideo: videoType === 'short' }),
        sharpDrops: detectSharpDrop({ ...row, format, videoType })
      };
    }

    function classifyActive(campaigns, benchmarks) {
      const withStatus = campaigns.map((campaign) => ({
        ...campaign,
        active: campaign.budgetUtil >= benchmarks.inactiveThreshold,
        status: campaign.budgetUtil >= benchmarks.inactiveThreshold ? 'Active' : 'Inactive'
      }));
      return {
        active: withStatus.filter((c) => c.active),
        inactive: withStatus.filter((c) => !c.active),
        all: withStatus
      };
    }

    function flagUntagged(campaigns) {
      return campaigns.filter((c) => c.type === 'Untagged' || c.format === 'Untagged');
    }

    function avg(values) {
      const nums = values.filter((v) => Number.isFinite(v));
      return nums.length ? nums.reduce((sum, value) => sum + value, 0) / nums.length : 0;
    }

    function sumMetric(campaigns, key) {
      return campaigns.reduce((sum, campaign) => sum + (Number(campaign[key]) || 0), 0);
    }

    function blendedRate(campaigns, numeratorKey, denominatorKey) {
      const numerator = sumMetric(campaigns, numeratorKey);
      const denominator = sumMetric(campaigns, denominatorKey);
      return denominator > 0 ? (numerator / denominator) * 100 : 0;
    }

    function top5(campaigns, metricKey, direction) {
      const sorted = [...campaigns].sort((a, b) => direction === 'lower' ? a[metricKey] - b[metricKey] : b[metricKey] - a[metricKey]);
      return sorted.slice(0, 5);
    }

    function bottom5(campaigns, metricKey, direction) {
      const sorted = [...campaigns].sort((a, b) => direction === 'lower' ? b[metricKey] - a[metricKey] : a[metricKey] - b[metricKey]);
      return sorted.slice(0, 5);
    }

    function groupBy(campaigns, field) {
      return campaigns.reduce((acc, campaign) => {
        const key = campaign[field] || 'Unknown';
        acc[key] = acc[key] || [];
        acc[key].push(campaign);
        return acc;
      }, {});
    }

    function platformAggregates(campaigns) {
      return Object.entries(groupBy(campaigns, 'platform')).map(([platform, rows]) => ({
        platform,
        spend: sumMetric(rows, 'spend'),
        reach: sumMetric(rows, 'reach'),
        impressions: sumMetric(rows, 'impressions'),
        clicks: sumMetric(rows, 'clicks'),
        engagements: sumMetric(rows, 'engagements'),
        ctr: blendedRate(rows, 'clicks', 'impressions'),
        cpm: sumMetric(rows, 'impressions') > 0 ? (sumMetric(rows, 'spend') / sumMetric(rows, 'impressions')) * 1000 : 0,
        cpe: sumMetric(rows, 'engagements') > 0 ? sumMetric(rows, 'spend') / sumMetric(rows, 'engagements') : 0,
        engRate: sumMetric(rows, 'reach') > 0 ? (sumMetric(rows, 'engagements') / sumMetric(rows, 'reach')) * 100 : 0,
        budgetUtil: sumMetric(rows, 'budget') > 0 ? (sumMetric(rows, 'spend') / sumMetric(rows, 'budget')) * 100 : 100,
        count: rows.length
      }));
    }

    function objectiveAggregates(campaigns) {
      return ['Traffic', 'Engagement', 'Awareness'].map((objective) => {
        const rows = campaigns.filter((c) => c.objective === objective);
        return { objective, spend: sumMetric(rows, 'spend'), count: rows.length };
      });
    }

    function typeAggregates(campaigns) {
      // Terminology:
      // - ads = individual uploaded rows/ad records
      // - campaigns = grouped creative themes / campaign types such as Brand, IPL, Live Video, Topical, Scooping
      return Object.entries(groupBy(campaigns, 'type')).map(([type, rows]) => ({
        type,
        spend: sumMetric(rows, 'spend'),
        count: rows.length,
        byObjective: {
          Traffic: rows.filter((c) => c.objective === 'Traffic').length,
          Engagement: rows.filter((c) => c.objective === 'Engagement').length,
          Awareness: rows.filter((c) => c.objective === 'Awareness').length
        },
        spendByObjective: {
          Traffic: sumMetric(rows.filter((c) => c.objective === 'Traffic'), 'spend'),
          Engagement: sumMetric(rows.filter((c) => c.objective === 'Engagement'), 'spend'),
          Awareness: sumMetric(rows.filter((c) => c.objective === 'Awareness'), 'spend')
        }
      })).sort((a, b) => b.count - a.count);
    }

    function formatAggregates(campaigns) {
      return Object.entries(groupBy(campaigns, 'format')).map(([format, rows]) => ({
        format,
        spend: sumMetric(rows, 'spend'),
        count: rows.length,
        ctr: blendedRate(rows, 'clicks', 'impressions'),
        cpm: sumMetric(rows, 'impressions') > 0 ? (sumMetric(rows, 'spend') / sumMetric(rows, 'impressions')) * 1000 : 0,
        cpe: sumMetric(rows, 'engagements') > 0 ? sumMetric(rows, 'spend') / sumMetric(rows, 'engagements') : 0
      }));
    }

    function pageAggregates(campaigns) {
      return Object.entries(groupBy(campaigns, 'accountName')).map(([accountName, rows]) => ({
        accountName,
        spend: sumMetric(rows, 'spend'),
        reach: sumMetric(rows, 'reach'),
        impressions: sumMetric(rows, 'impressions'),
        ctr: blendedRate(rows, 'clicks', 'impressions'),
        cpm: sumMetric(rows, 'impressions') > 0 ? (sumMetric(rows, 'spend') / sumMetric(rows, 'impressions')) * 1000 : 0,
        cpe: sumMetric(rows, 'engagements') > 0 ? sumMetric(rows, 'spend') / sumMetric(rows, 'engagements') : 0,
        engRate: sumMetric(rows, 'reach') > 0 ? (sumMetric(rows, 'engagements') / sumMetric(rows, 'reach')) * 100 : 0,
        count: rows.length
      }));
    }

    function monthKey(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
    }

    function parseDateFilterValue(value, endOfDay = false) {
      if (!value) return null;
      const [year, month, day] = String(value).split('-').map(Number);
      if (!year || !month || !day) return null;
      return endOfDay
        ? new Date(year, month - 1, day, 23, 59, 59, 999)
        : new Date(year, month - 1, day, 0, 0, 0, 0);
    }

    function matchesDateFilter(campaign, filter = dateFilter) {
      if (!filter?.from && !filter?.to) return true;
      if (!campaign?.date) return true;
      const time = campaign.date.getTime();
      if (filter.from && time < filter.from.getTime()) return false;
      if (filter.to && time > filter.to.getTime()) return false;
      return true;
    }

    function filterCampaignsByDate(campaigns, filter = dateFilter) {
      return (campaigns || []).filter((campaign) => matchesDateFilter(campaign, filter));
    }

    function dedupeCampaignsByName(campaigns) {
      return Object.values((campaigns || []).reduce((acc, campaign) => {
        if (!campaign?.name) return acc;
        if (!acc[campaign.name]) acc[campaign.name] = campaign;
        return acc;
      }, {}));
    }

    function compareDateInputStrings(a, b) {
      if (!a || !b) return 0;
      return String(a).localeCompare(String(b));
    }

    function loadStoredJson(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch (error) {
        return fallback;
      }
    }

    function saveStoredJson(key, value) {
      try {
        localStorage.setItem(key, JSON.stringify(value));
        return true;
      } catch (error) {
        console.warn(`Could not save ${key}:`, error);
        return false;
      }
    }

    function getCalendarCacheKey(calendarId, year) {
      return `${GCAL_CACHE_PREFIX}${calendarId}_${year}`;
    }

    function readFreshCalendarCache(calendarId, year) {
      const cached = loadStoredJson(getCalendarCacheKey(calendarId, year), null);
      if (!cached?.fetchedAt || !Array.isArray(cached.events)) return null;
      return (Date.now() - cached.fetchedAt) <= GCAL_CACHE_TTL ? cached.events : null;
    }

    function writeCalendarCache(calendarId, year, events) {
      saveStoredJson(getCalendarCacheKey(calendarId, year), {
        events,
        fetchedAt: Date.now()
      });
    }

    function normalizeFestivalType(name, calendarId) {
      const title = String(name || '').toLowerCase();
      if (calendarId === DEFAULT_INDIAN_HOLIDAY_CALENDAR_ID) {
        if (title.includes('republic') || title.includes('independence') || title.includes('gandhi')) return 'national';
        return 'festival';
      }
      return 'cultural';
    }

    function makeFestivalEventSignature(date, name) {
      return `${String(date || '').trim()}__${String(name || '').trim().toLowerCase()}`;
    }

    function formatEventMonthLabel(dateValue) {
      const date = parseDateFilterValue(dateValue);
      return date ? formatMonthLabel(date) : 'Unknown';
    }

    async function fetchCalendarEventsFromBackend(calendarIds, years) {
      const uniqueCalendarIds = [...new Set((calendarIds || []).map((id) => String(id || '').trim()).filter(Boolean))];
      const uniqueYears = [...new Set((years || []).map((year) => Number(year)).filter(Number.isFinite))];
      const requests = [];

      uniqueCalendarIds.forEach((calendarId) => {
        uniqueYears.forEach((year) => {
          const cached = readFreshCalendarCache(calendarId, year);
          if (cached) {
            requests.push(Promise.resolve(cached));
            return;
          }
          const url = `${CALENDAR_EVENTS_API_ENDPOINT}?calendarId=${encodeURIComponent(calendarId)}&year=${encodeURIComponent(year)}`;
          requests.push(
            fetch(url)
              .then((response) => {
                if (!response.ok) throw new Error(`Calendar fetch failed for ${calendarId}`);
                return response.json();
              })
              .then((payload) => {
                const sourceEvents = Array.isArray(payload?.events) ? payload.events : Array.isArray(payload?.items) ? payload.items : [];
                const events = sourceEvents
                  .map((event) => ({
                    date: event?.date || event?.start?.date || '',
                    name: event?.name || event?.summary || 'Untitled Event',
                    type: normalizeFestivalType(event?.name || event?.summary, calendarId),
                    calendarId,
                    source: 'api',
                    nickname: event?.nickname || ''
                  }))
                  .filter((event) => event.date);
                writeCalendarCache(calendarId, year, events);
                return events;
              })
          );
        });
      });

      const resolved = await Promise.all(requests);
      return resolved.flat();
    }

    function buildFestivalEvents(apiEvents = [], userEvents = loadStoredJson(USER_FESTIVAL_EVENTS_STORAGE_KEY, []), hiddenEvents = loadStoredJson(HIDDEN_GCAL_EVENTS_STORAGE_KEY, [])) {
      const hiddenSet = new Set((hiddenEvents || []).map((item) => String(item)));
      const deduped = [];
      const seen = new Set();
      [...apiEvents, ...(userEvents || [])].forEach((event) => {
        if (!event?.date || !event?.name) return;
        const signature = makeFestivalEventSignature(event.date, event.name);
        if (event.source === 'api' && hiddenSet.has(signature)) return;
        if (seen.has(signature)) return;
        seen.add(signature);
        deduped.push({
          date: event.date,
          name: event.name,
          type: event.type || 'festival',
          calendarId: event.calendarId || '',
          source: event.source || 'user',
          nickname: event.nickname || '',
          id: event.id || signature
        });
      });
      deduped.sort((a, b) => {
        const dateCmp = String(a.date).localeCompare(String(b.date));
        if (dateCmp !== 0) return dateCmp;
        return String(a.name).localeCompare(String(b.name));
      });
      festivalEvents = deduped;
      return deduped;
    }

    function buildFestivalEditorEvents(apiEvents = [], userEvents = [], hiddenEvents = [], userCalendarIds = []) {
      const hiddenSet = new Set((hiddenEvents || []).map((item) => String(item)));
      const nicknameMap = Object.fromEntries((userCalendarIds || []).map((row) => [row.id, row.nickname || '']));
      const merged = [...apiEvents, ...userEvents].map((event) => {
        const signature = makeFestivalEventSignature(event.date, event.name);
        return {
          ...event,
          id: event.id || signature,
          hidden: event.source === 'api' ? hiddenSet.has(signature) : false,
          nickname: event.nickname || nicknameMap[event.calendarId] || ''
        };
      });
      merged.sort((a, b) => {
        const dateCmp = String(a.date).localeCompare(String(b.date));
        if (dateCmp !== 0) return dateCmp;
        return String(a.name).localeCompare(String(b.name));
      });
      return merged;
    }

    function normalizeMonthUndatedRows(monthData) {
      return monthData?.untaggedCategories?.date || [];
    }

    function calendarData(campaigns, monthDate) {
      const startKey = monthKey(monthDate);
      const byDate = {};
      const undated = [];
      campaigns.forEach((campaign) => {
        if (!campaign.date) {
          undated.push(campaign);
          return;
        }
        if (monthKey(campaign.date) !== startKey) return;
        const key = localDateKey(campaign.date);
        byDate[key] = byDate[key] || [];
        byDate[key].push(campaign);
      });
      return { byDate, undated };
    }

    function activityMonthColor(index) {
      return ['#F5A623', '#1877F2', '#8A9CC0'][index] || '#00C9A7';
    }

    function addAlpha(hex, alpha = 1) {
      const clean = String(hex || '').replace('#', '');
      if (clean.length !== 6) return hex;
      const a = Math.max(0, Math.min(255, Math.round(alpha * 255)));
      return `#${clean}${a.toString(16).padStart(2, '0')}`;
    }

    function nextMonthKey(date) {
      return monthKey(new Date(date.getFullYear(), date.getMonth() + 1, 1));
    }

    function buildActivityOverview(monthsDesc) {
      const uploadedMonths = [...monthsDesc]
        .sort((a, b) => a.month - b.month)
        .map((month, index) => ({
          label: month.label,
          month: month.month,
          color: activityMonthColor(index),
          byDate: {},
          totalAds: 0,
          ads: []
        }));
      const byMonthLabel = Object.fromEntries(uploadedMonths.map((entry) => [entry.label, entry]));
      const monthKeyToLabel = Object.fromEntries(uploadedMonths.map((entry) => [monthKey(entry.month), entry.label]));
      const undated = [];

      monthsDesc.forEach((month) => {
        month.active.forEach((campaign) => {
          if (!campaign.date) {
            undated.push(campaign);
            return;
          }
          const bucketLabel = monthKeyToLabel[monthKey(campaign.date)];
          if (!bucketLabel) return;
          const bucket = byMonthLabel[bucketLabel];
          const key = localDateKey(campaign.date);
          bucket.byDate[key] = bucket.byDate[key] || [];
          bucket.byDate[key].push(campaign);
          bucket.totalAds += 1;
          bucket.ads.push(campaign);
        });
      });

      const monthsWithAds = uploadedMonths.filter((entry) => entry.totalAds > 0);
      return {
        months: monthsWithAds,
        byLabel: Object.fromEntries(monthsWithAds.map((entry) => [entry.label, entry])),
        undated,
        undatedCount: undated.length
      };
    }

    function getObjectiveMetric(campaign, rank) {
      const map = {
        Traffic: {
          primary: { key: 'ctr', label: 'CTR', fmt: 'pct' },
          secondary: { key: 'cpc', label: 'CPC', fmt: 'cur' }
        },
        Engagement: {
          primary: { key: 'engRate', label: 'Eng Rate', fmt: 'pct' },
          secondary: { key: 'cpe', label: 'CPE', fmt: 'cur3' }
        },
        Awareness: {
          primary: { key: 'reach', label: 'Reach', fmt: 'num' },
          secondary: { key: 'cpr', label: 'CPR', fmt: 'cur' }
        }
      };
      return map[campaign.objective]?.[rank] ?? map.Engagement[rank];
    }

    function formatByType(value, type) {
      if (type === 'pct') return fmt.pct(value);
      if (type === 'cur') return fmt.cur(value);
      if (type === 'cur1') return fmt.cur1(value);
      if (type === 'cur3') return fmt.cur3(value);
      if (type === 'num') return fmt.num(value);
      return String(value ?? '');
    }

    function formatMetricDescriptor(campaign, rank) {
      const descriptor = getObjectiveMetric(campaign, rank);
      return `${descriptor.label} ${formatByType(campaign[descriptor.key], descriptor.fmt)}`;
    }

    function formatAbsolute(metricKey, value) {
      const abs = Math.abs(value);
      if (metricKey === 'spend' || metricKey === 'totalSpend') return fmt.inr(abs);
      if (metricKey === 'budgetUtil' || metricKey === 'ctr' || metricKey === 'engRate' || metricKey === 'completionRate') return `${abs.toFixed(2)}%`;
      if (metricKey === 'campaigns' || metricKey === 'activeCampaigns' || metricKey === 'campaignTypes') return fmt.num(abs);
      if (metricKey === 'cpe') return fmt.cur3(abs);
      if (metricKey === 'cpm' || metricKey === 'cpc' || metricKey === 'cpr') return fmt.cur0(abs);
      if (metricKey === 'pagePerf') return abs.toFixed(2);
      if (metricKey === 'reach' || metricKey === 'totalReach' || metricKey === 'impressions' || metricKey === 'totalImpressions') return fmt.num(abs);
      return fmt.num(abs);
    }

    function calcMoM(current, previous, metricKey, direction = 'higher-better') {
      if (!previous) return null;
      const curr = current[metricKey] || 0;
      const prev = previous[metricKey] || 0;
      const diff = curr - prev;
      const pct = prev !== 0 ? (diff / prev) * 100 : 0;
      const isGood = direction === 'neutral' ? null : direction === 'higher-better' ? diff > 0 : diff < 0;
      return {
        current: curr,
        previous: prev,
        diff,
        pct,
        color: direction === 'neutral' ? '#F5A623' : isGood ? '#00C9A7' : diff === 0 ? '#8A9CC0' : '#B8860B',
        label: `${diff > 0 ? '↑' : diff < 0 ? '↓' : '→'} ${formatAbsolute(metricKey, diff)} (${Math.abs(pct).toFixed(1)}%)`
      };
    }

    function pillFromMom(metricLabel, mom, neutralTone = 'positive') {
      if (!mom) return null;
      const tone = mom.color === '#00C9A7' ? 'positive' : mom.color === '#F5A623' ? neutralTone : 'negative';
      const arrow = mom.diff > 0 ? '↑' : mom.diff < 0 ? '↓' : '→';
      return { label: `${metricLabel} ${arrow} ${Math.abs(mom.pct).toFixed(1)}%`, tone };
    }

    function toneFromMom(mom) {
      if (!mom) return 'neutral';
      if (mom.color === '#00C9A7') return 'positive';
      if (mom.color === '#FF7A8F' || mom.color === '#A8001A') return 'critical';
      if (mom.color === '#8A9CC0') return 'neutral';
      return 'negative';
    }

    function buildMoMLabel(metricLabel, mom, prevLabel) {
      if (!mom || !prevLabel) return null;
      return {
        label: `${metricLabel} ${mom.label} vs ${prevLabel}`,
        tone: toneFromMom(mom)
      };
    }

    function buildMoMLabelAbsoluteOnly(metricLabel, mom, prevLabel, metricKey = 'spend') {
      if (!mom || !prevLabel) return null;
      const arrow = mom.diff > 0 ? '↑' : mom.diff < 0 ? '↓' : '→';
      return {
        label: `${metricLabel} ${arrow} ${formatAbsolute(metricKey, mom.diff)} vs ${prevLabel}`,
        tone: toneFromMom(mom)
      };
    }

    function summarizeCampaignSet(campaigns, benchmarks) {
      const spend = sumMetric(campaigns, 'spend');
      const budget = sumMetric(campaigns, 'budget');
      const reach = sumMetric(campaigns, 'reach');
      const impressions = sumMetric(campaigns, 'impressions');
      const engagements = sumMetric(campaigns, 'engagements');
      return {
        spend,
        budget,
        reach,
        impressions,
        engagements,
        cpm: impressions > 0 ? (spend / impressions) * 1000 : 0,
        cpe: engagements > 0 ? spend / engagements : 0,
        engRate: reach > 0 ? (engagements / reach) * 100 : 0,
        budgetUtil: budget > 0 ? (spend / budget) * 100 : 100,
        count: campaigns.length,
        underDeliveredCount: campaigns.filter((c) => c.budgetUtil >= benchmarks.inactiveThreshold && c.budgetUtil < benchmarks.poorBudgetMax).length
      };
    }

    function getPlatformDescriptor(platform) {
      return platformDescriptors[platform] || `Delivery focused on ${platform} placements`;
    }

    function fmtLakhs(value) {
      const amount = Number(value) || 0;
      if (Math.abs(amount) >= 1e5) return `₹${(amount / 1e5).toFixed(1)}L`;
      return fmt.inr(amount);
    }

    function detectFormatBucket(source) {
      const campaign = source && typeof source === 'object' ? source : { name: source };
      const raw = String(campaign.name || '').toLowerCase();
      const platform = String(campaign.platform || campaign.metaPlatform || '').toLowerCase();
      const accountName = String(campaign.accountName || '').toLowerCase();
      const hasVideoMetrics = Number(campaign.v3s || 0) > 0;
      if (raw.includes('video')) return 'VIDEO';
      if (raw.includes('reel')) return 'OTHER';
      if (raw.includes('static') && hasVideoMetrics && (platform.includes('instagram') || accountName.includes('instagram'))) return 'VIDEO';
      if (raw.includes('static')) return 'STATIC';
      if (raw.includes('carousel')) return 'CAROUSEL';
      if (raw.includes('post')) return 'POST';
      return 'OTHER';
    }

    function detectVideoSubformat(name) {
      const raw = String(name || '').toLowerCase();
      if (raw.includes('live')) return 'Live';
      if (raw.includes('brand')) return 'Brand';
      if (raw.includes('topical')) return 'Topical';
      if (raw.includes('ipl')) return 'IPL';
      return 'Other';
    }

    function detectCampaignSubtype(name) {
      const raw = String(name || '').toLowerCase();
      if (raw.includes('live')) return 'Live';
      if (raw.includes('brand')) return 'Brand';
      if (raw.includes('topical')) return 'Topical';
      if (raw.includes('ipl')) return 'IPL';
      if (raw.includes('carousel')) return 'Carousel';
      if (raw.includes('static')) return 'Static';
      return 'Other';
    }

    function hasAnyVideoMetrics(campaign) {
      return Number(campaign?.v3s || 0) > 0 || Number(campaign?.v25 || 0) > 0 || Number(campaign?.v50 || 0) > 0 || Number(campaign?.v100 || 0) > 0;
    }

    function detectVideoType(campaign) {
      const format = String(campaign?.format || '');
      const v3s = Number(campaign?.v3s || 0);
      const v25 = Number(campaign?.v25 || 0);
      if (format === 'Video' && v25 > v3s) return 'short';
      if (format === 'Carousel' && v25 > v3s) return 'carousel';
      return 'normal';
    }

    function isStandardVideo(campaign) {
      return String(campaign?.format || '') === 'Video' && Number(campaign?.v3s || 0) > Number(campaign?.v25 || 0);
    }

    function getVideoClassificationTag(campaign) {
      if (campaign?.isShortVideo) return '~3 sec video';
      if (isStandardVideo(campaign)) return '3s+ video';
      return null;
    }

    function calculateHookRate(campaign) {
      if (!hasAnyVideoMetrics(campaign)) return null;
      if (String(campaign?.format || '') === 'Carousel') return null;
      const impressions = Number(campaign?.impressions || 0);
      if (impressions <= 0) return null;
      return ((Number(campaign?.v3s) || 0) / impressions) * 100;
    }

    function calculateHoldRate(campaign) {
      if (!hasAnyVideoMetrics(campaign)) return null;
      if (String(campaign?.format || '') === 'Carousel') return null;
      const v3s = Number(campaign?.v3s || 0);
      if (v3s <= 0) return null;
      return Math.min(100, ((Number(campaign?.v50) || 0) / v3s) * 100);
    }

    function calculateVtr(campaign) {
      if (!hasAnyVideoMetrics(campaign)) return null;
      const impressions = Number(campaign?.impressions || 0);
      if (impressions <= 0) return null;
      return ((Number(campaign?.v100) || 0) / impressions) * 100;
    }

    function detectSharpDrop(campaign) {
      if (!hasAnyVideoMetrics(campaign)) return null;
      const steps = [
        { label: '3-sec', value: Number(campaign?.v3s || 0) },
        { label: '25%', value: Number(campaign?.v25 || 0) },
        { label: '50%', value: Number(campaign?.v50 || 0) },
        { label: '75%', value: Number(campaign?.v75 || 0) },
        { label: '95%', value: Number(campaign?.v95 || 0) },
        { label: '100%', value: Number(campaign?.v100 || 0) }
      ];
      const drops = [];
      for (let i = 0; i < steps.length - 1; i += 1) {
        const previous = steps[i];
        const current = steps[i + 1];
        if (previous.value <= 0) continue;
        const dropPct = ((previous.value - current.value) / previous.value) * 100;
        if (dropPct > 50) {
          drops.push({
            from: previous.label,
            to: current.label,
            dropPct
          });
        }
      }
      return drops.sort((a, b) => b.dropPct - a.dropPct);
    }

    function getLogicalCampaignGroup(source) {
      const campaign = source && typeof source === 'object' ? source : { name: source };
      if (campaign.type && campaign.type !== 'Unknown') return campaign.type;
      return parseCampaign(campaign.name, campaign.metaPlatform || '').type || 'Untagged';
    }

    function buildFormatBreakdownChart(rows) {
      const safeRows = rows || [];
      const formatLabels = ['Video', 'Static', 'Carousel', 'Post', 'Reel', 'Other', 'Untagged']
        .filter((format) => safeRows.some((row) => (row.format || 'Untagged') === format));
      const platforms = ['Facebook', 'Instagram', 'Combined/Auto']
        .filter((platform) => safeRows.some((row) => (row.platform || 'Combined/Auto') === platform));
      return {
        labels: formatLabels,
        datasets: platforms.map((platform) => ({
          label: platform,
          data: formatLabels.map((format) => safeRows.filter((row) => (row.format || 'Untagged') === format && (row.platform || 'Combined/Auto') === platform).length),
          backgroundColor: platformColors[platform] || '#6B7FA3'
        }))
      };
    }

    function objectiveGroupForValues(objectives) {
      const values = [...new Set(objectives.filter(Boolean).map((value) => String(value).trim()))];
      if (values.length !== 1) return 'OTHER';
      const objective = values[0].toLowerCase();
      if (objective.includes('engagement')) return 'ENGAGEMENT';
      if (objective.includes('traffic')) return 'TRAFFIC';
      if (objective.includes('awareness') || objective.includes('reach')) return 'AWARENESS';
      return 'OTHER';
    }

    function objectiveToneForGroup(group) {
      if (group === 'ENGAGEMENT') return 'engagement';
      if (group === 'TRAFFIC') return 'traffic';
      if (group === 'AWARENESS') return 'awareness';
      return 'other';
    }

    function truncateAxisLabel(value, max = 18) {
      const text = String(value || '');
      return text.length > max ? `${text.slice(0, max - 1)}…` : text;
    }

    function getFormatBucketColor(bucket) {
      return getFormatColor(FORMAT_BUCKET_COLOR_KEYS[bucket] || 'Other');
    }

    function getFormatColor(format) {
      return FORMAT_COLORS[format] || '#6B7FA3';
    }

    function getPageColor(index) {
      return PAGE_COLORS[index % PAGE_COLORS.length];
    }

    function getMetricDescriptor(label) {
      return METRIC_DESCRIPTORS[label] || METRIC_DESCRIPTORS[String(label || '').toUpperCase()] || '';
    }

    function getMetricFormula(label) {
      const raw = String(label || '').trim();
      const normalized = raw.toUpperCase();
      const formulaMetricMap = {
        'BLENDED CPM': 'CPM',
        'BLENDED CPE': 'CPE',
        'BLENDED ENG RATE': 'Engagement Rate',
        'ENG RATE': 'Engagement Rate',
        'BUDGET UTIL': 'Budget Utilisation',
        'BUDGET UTILISATION': 'Budget Utilisation',
        'NON-CLICK ENG RATE': 'Non-Click Eng Rate',
        'COMPLETION RATE': 'Completion Rate',
        'HOOK RATE': 'Hook Rate',
        'HOLD RATE': 'Hold Rate',
        'VTR': 'VTR',
        'CTR': 'CTR',
        'CPM': 'CPM',
        'CPE': 'CPE'
      };
      const lookup = formulaMetricMap[normalized] || raw;
      const match = formulas.find((item) => item.metric.toLowerCase() === String(lookup).toLowerCase());
      return match?.formula || '';
    }

    function buildMetricInfoText(label, descriptor) {
      const parts = [];
      const copy = descriptor || getMetricDescriptor(label);
      const formula = getMetricFormula(label);
      if (copy) parts.push(copy);
      if (formula) parts.push(`Formula: ${formula}`);
      return parts.join('\n\n');
    }

    function getPopupDescriptor(type, context = {}) {
      const template = POPUP_DESCRIPTORS[type] || '';
      return template
        .replace('{platform}', context.platform || '')
        .replace('{month}', context.month || '');
    }

    function MetricInfoIcon({ text }) {
      if (!text) return null;
      return (
        <span className="metric-info" tabIndex={0} aria-label={text}>
          i
          <span className="metric-tooltip">{text}</span>
        </span>
      );
    }

    function LabelWithDescriptor({ label, descriptor }) {
      const copy = buildMetricInfoText(label, descriptor);
      return (
        <div className="metric-label-row">
          <div className="label-block">
            <div className="card-label">{label}</div>
          </div>
          <MetricInfoIcon text={copy} />
        </div>
      );
    }

    function formatVtr(campaign) {
      return calculateVtr(campaign);
    }

    function makeMonthTable(monthsAsc, rows) {
      if (monthsAsc.length <= 1) return { months: [], rows: [] };
      return { months: monthsAsc, rows };
    }

    function buildMonthRows(monthsAsc, summariesByLabel, specs) {
      const currentLabel = monthsAsc[monthsAsc.length - 1];
      const prevLabel = monthsAsc[monthsAsc.length - 2];
      return specs.map((spec) => {
        const current = summariesByLabel[currentLabel];
        const previous = prevLabel ? summariesByLabel[prevLabel] : null;
        const mom = calcMoM(current, previous, spec.key, spec.direction);
        return {
          metric: spec.label,
          values: monthsAsc.reduce((acc, label) => {
            const summary = summariesByLabel[label];
            acc[label] = spec.format(summary[spec.key], summary);
            return acc;
          }, {}),
          change: mom ? `${spec.changeLabel} ${mom.label}` : '--',
          tone: mom?.color === '#00C9A7' ? 'positive' : mom?.color === '#A8001A' ? 'critical' : 'negative'
        };
      });
    }

    function metricLabel(key) {
      return { ctr: 'CTR', nonClickEngRate: 'Non-Click Eng', cpm: 'CPM Efficiency' }[key] || key;
    }

    function normalizeSignalEntries(signalValue, sectionKey) {
      if (signalValue?.insufficientData) {
        return [{ id: `${sectionKey}-insufficient`, insufficientData: true, message: signalValue.message }];
      }
      const rows = Array.isArray(signalValue) ? signalValue : [];
      return rows.map((signal, idx) => ({
        id: `${sectionKey}-${idx}`,
        campaignId: signal.campaign.id,
        name: signal.campaign.name,
        isShortVideo: signal.campaign.isShortVideo,
        signal: signal.signal,
        metric1: `${signal.metric1.label} ${signal.metric1.value}`,
        metric2: `${signal.metric2.label}: ${signal.metric2.value}`
      }));
    }

    function summarizeSignalTypes(signals) {
      const labels = [];
      if (Array.isArray(signals.signal1) && signals.signal1.length) labels.push('Engagement');
      if (Array.isArray(signals.signal2) && signals.signal2.length) labels.push('Traffic');
      if (Array.isArray(signals.signal3) && signals.signal3.length) labels.push('Awareness');
      if (Array.isArray(signals.signal4) && signals.signal4.length) labels.push('Multi-dimensional');
      return labels;
    }

    function countSignalEntries(signals) {
      return ['signal1', 'signal2', 'signal3', 'signal4'].reduce((sum, key) => sum + (Array.isArray(signals[key]) ? signals[key].length : 0), 0);
    }

    function getMissedReason(campaign) {
      if (campaign.objective === 'Traffic') return 'Strong CTR despite under-delivery';
      if (campaign.objective === 'Engagement') return 'Strong non-click engagement despite under-delivery';
      if (campaign.objective === 'Awareness') return 'Unexpected clicks despite awareness objective';
      return 'Strong creative signal despite under-delivery';
    }

    function getMissedMetricLabel(campaign) {
      if (campaign.objective === 'Traffic') return 'CTR';
      if (campaign.objective === 'Engagement') return 'Non-Click Eng Rate';
      if (campaign.objective === 'Awareness') return 'CTR';
      return 'Primary Metric';
    }

    function getMissedMetricValue(campaign) {
      if (campaign.objective === 'Traffic') return fmt.pct(campaign.ctr);
      if (campaign.objective === 'Engagement') return fmt.pct(campaign.nonClickEngRate);
      if (campaign.objective === 'Awareness') return fmt.pct(campaign.ctr);
      return '--';
    }

    function getMissedComparisonLabel(campaign, avgCTR_traffic, avgNonClickEngRate_eng, benchmarks) {
      if (campaign.objective === 'Traffic') return `Benchmark: ${benchmarks.ctr}%`;
      if (campaign.objective === 'Engagement') return `Avg Non-Click Eng (Engagement ads): ${avgNonClickEngRate_eng.toFixed(2)}%`;
      if (campaign.objective === 'Awareness') return `Avg CTR (Traffic ads): ${avgCTR_traffic.toFixed(3)}%`;
      return '--';
    }

    function calculateMissedOpportunities(activeCampaigns, benchmarks, currentMonthLabel) {
      const allImpressions = activeCampaigns.map((campaign) => campaign.impressions).sort((a, b) => a - b);
      const p25Index = Math.floor(allImpressions.length * 0.25);
      const p25Impressions = allImpressions[p25Index] || 0;

      const trafficAds = activeCampaigns.filter((campaign) => campaign.objective === 'Traffic');
      const engagementAds = activeCampaigns.filter((campaign) => campaign.objective === 'Engagement');
      const awarenessAds = activeCampaigns.filter((campaign) => campaign.objective === 'Awareness');

      const avgCTR_traffic = avg(trafficAds.map((campaign) => campaign.ctr));
      const avgNonClickEngRate_eng = avg(engagementAds.map((campaign) => campaign.nonClickEngRate));

      const underDelivered = activeCampaigns.filter((campaign) =>
        campaign.budgetUtil >= benchmarks.inactiveThreshold &&
        campaign.budgetUtil < benchmarks.poorBudgetMax
      );

      const missed = underDelivered.filter((campaign) => {
        if (campaign.impressions < p25Impressions) return false;
        if (campaign.objective === 'Traffic') return campaign.ctr > benchmarks.ctr;
        if (campaign.objective === 'Engagement') return campaign.nonClickEngRate > avgNonClickEngRate_eng;
        if (campaign.objective === 'Awareness') return campaign.ctr > avgCTR_traffic;
        return false;
      });

      return {
        ads: missed.map((campaign) => ({
          ...campaign,
          missedReason: getMissedReason(campaign),
          metricLabel: getMissedMetricLabel(campaign),
          metricValue: getMissedMetricValue(campaign),
          comparisonLabel: getMissedComparisonLabel(campaign, avgCTR_traffic, avgNonClickEngRate_eng, benchmarks),
          unspentBudget: campaign.budget - campaign.spend
        })),
        meta: {
          month: currentMonthLabel,
          p25Impressions,
          avgCTR_traffic,
          avgNonClickEngRate_eng,
          totalUnspentBudget: missed.reduce((sum, campaign) => sum + (campaign.budget - campaign.spend), 0),
          count: missed.length,
          poorBudgetMax: benchmarks.poorBudgetMax,
          inactiveThreshold: benchmarks.inactiveThreshold,
          ctrBenchmark: benchmarks.ctr
        }
      };
    }

    function calculateCreativeOpportunity(activeCampaigns, benchmarks, currentMonthLabel) {
      const trafficAds = activeCampaigns.filter((c) => c.objective === 'Traffic');
      const engagementAds = activeCampaigns.filter((c) => c.objective === 'Engagement');
      const awarenessAds = activeCampaigns.filter((c) => c.objective === 'Awareness');

      const avgCTR_traffic = avg(trafficAds.map((c) => c.ctr));

      activeCampaigns.forEach((campaign) => {
        const nonClickEng = Math.max(0, (campaign.engagements || 0) - (campaign.clicks || 0));
        campaign.nonClickEng = nonClickEng;
        campaign.nonClickEngRate = campaign.reach > 0 ? (nonClickEng / campaign.reach) * 100 : 0;
      });

      const avgNonClickEngRate_engagement = avg(engagementAds.map((c) => c.nonClickEngRate));
      const avgReachEff_awareness = avg(awarenessAds.map((c) => (c.spend > 0 ? c.reach / c.spend : 0)));
      const avgCPM_awareness = avg(awarenessAds.map((c) => c.cpm));

      const signal1 = trafficAds.length < 5
        ? { insufficientData: true, message: 'Need at least 5 Traffic ads to calculate reliable CTR benchmark' }
        : engagementAds
          .filter((c) => c.ctr > benchmarks.ctr && c.ctr > avgCTR_traffic)
          .map((c) => ({
            campaign: c,
            signal: 'Engagement ad driving unexpected clicks',
            metric1: { label: 'CTR', value: fmt.pct(c.ctr) },
            metric2: { label: 'vs Traffic avg', value: `${fmt.pct(avgCTR_traffic)} | Benchmark: ${benchmarks.ctr}%` },
            type: 'engagement'
          }));

      const signal2 = engagementAds.length < 5
        ? { insufficientData: true, message: 'Need at least 5 Engagement ads to calculate reliable non-click engagement benchmark' }
        : trafficAds
          .filter((c) => c.reach > 0 && c.nonClickEngRate > avgNonClickEngRate_engagement)
          .map((c) => ({
            campaign: c,
            signal: 'Traffic ad resonating emotionally beyond its objective',
            metric1: { label: 'Non-Click Eng Rate', value: fmt.pct(c.nonClickEngRate) },
            metric2: { label: 'vs Engagement avg', value: `${fmt.pct(avgNonClickEngRate_engagement)}` },
            type: 'traffic'
          }));

      const signal3 = awarenessAds.length < 5
        ? { insufficientData: true, message: 'Need at least 5 Awareness ads to calculate reliable reach efficiency signals' }
        : awarenessAds
          .filter((c) => c.spend > 0 && c.cpm < benchmarks.cpm && (c.reach / c.spend) > avgReachEff_awareness)
          .map((c) => ({
            campaign: c,
            signal: 'Awareness ad delivering exceptional reach per rupee',
            metric1: { label: 'CPM', value: fmt.cur(c.cpm) },
            metric2: { label: 'Avg CPM this month', value: `₹${avgCPM_awareness.toFixed(0)} | Benchmark: ₹${benchmarks.cpm}` },
            type: 'awareness'
          }));

      const lists = {
        ctr: top5(activeCampaigns, 'ctr', 'higher'),
        nonClickEngRate: top5(activeCampaigns, 'nonClickEngRate', 'higher'),
        cpm: top5(activeCampaigns, 'cpm', 'lower')
      };

      const appearances = {};
      Object.entries(lists).forEach(([metric, camps]) => {
        camps.forEach((campaign) => {
          if (!appearances[campaign.name]) appearances[campaign.name] = { campaign, metrics: [] };
          appearances[campaign.name].metrics.push(metric);
        });
      });

      const signal4 = Object.values(appearances)
        .filter((entry) => entry.metrics.length >= 2)
        .map((entry) => ({
          campaign: entry.campaign,
          signal: 'Multi-dimensional performer',
          metric1: { label: 'Appears in', value: entry.metrics.map((metric) => metricLabel(metric)).join(', ') },
          metric2: { label: 'Score', value: `${entry.metrics.length} of 3 lists` },
          type: 'multi'
        }));

      return {
        signal1,
        signal2,
        signal3,
        signal4,
        meta: {
          month: currentMonthLabel,
          avgCTR_traffic,
          avgNonClickEngRate_engagement,
          avgCPM_awareness,
          avgReachEff_awareness,
          ctrBenchmark: benchmarks.ctr,
          cpmBenchmark: benchmarks.cpm,
          trafficCount: trafficAds.length,
          engagementCount: engagementAds.length,
          awarenessCount: awarenessAds.length
        }
      };
    }

    function signalGroups(signals) {
      return {
        signal1: normalizeSignalEntries(signals.signal1, 'signal1'),
        signal2: normalizeSignalEntries(signals.signal2, 'signal2'),
        signal3: normalizeSignalEntries(signals.signal3, 'signal3'),
        signal4: normalizeSignalEntries(signals.signal4, 'signal4')
      };
    }

    function buildHistoryLines(currentCampaign, monthsDesc) {
      if (monthsDesc.length <= 1) return [];
      const entries = monthsDesc
        .map((month) => month.all.find((item) => item.name === currentCampaign.name))
        .filter(Boolean)
        .reverse();
      if (entries.length <= 1) return [];
      const primary = getObjectiveMetric(currentCampaign, 'primary');
      const spendValues = entries.map((c) => `${formatMonthLabel(c.datasetMonth)} ${fmt.inr(c.spend)}`).join(' · ');
      const primaryValues = entries.map((c) => `${formatMonthLabel(c.datasetMonth)} ${formatByType(c[primary.key], primary.fmt)}`).join(' · ');
      const latest = entries[entries.length - 1];
      const prev = entries[entries.length - 2];
      return [
        { metric: primary.label, values: primaryValues, delta: calcMoM({ [primary.key]: latest[primary.key] }, { [primary.key]: prev[primary.key] }, primary.key, directions[primary.key] || 'higher-better')?.label || '--' },
        { metric: 'Spend', values: spendValues, delta: calcMoM({ spend: latest.spend }, { spend: prev.spend }, 'spend', 'neutral')?.label || '--' }
      ];
    }

    function toPanelItem(campaign, monthsDesc) {
      const hookRate = calculateHookRate(campaign);
      const holdRate = calculateHoldRate(campaign);
      const vtr = calculateVtr(campaign);
      const sharpDrops = detectSharpDrop(campaign);
      return {
        ...campaign,
        primaryMetric: formatMetricDescriptor(campaign, 'primary'),
        secondaryMetric: formatMetricDescriptor(campaign, 'secondary'),
        nonClickEngRateLabel: fmt.pct(campaign.nonClickEngRate || 0),
        hookRateLabel: Number.isFinite(hookRate) ? fmt.pct(hookRate, 2) : '—',
        holdRateLabel: Number.isFinite(holdRate) ? fmt.pct(holdRate, 2) : '—',
        vtrLabel: Number.isFinite(vtr) ? fmt.pct(vtr, 2) : '—',
        sharpDrops,
        videoClassificationTag: getVideoClassificationTag(campaign),
        dateLabel: campaign.date ? formatLongDate(campaign.date) : null,
        videoRetention: campaign.hasAnyVideoMetrics ? {
          '3 sec': campaign.v3s > 0 ? '100%' : '0%',
          '25%': campaign.v3s > 0 ? fmt.pct((campaign.v25 / campaign.v3s) * 100) : '0.00%',
          '50%': campaign.v3s > 0 ? fmt.pct((campaign.v50 / campaign.v3s) * 100) : '0.00%',
          '75%': campaign.v3s > 0 ? fmt.pct((campaign.v75 / campaign.v3s) * 100) : '0.00%',
          '95%': campaign.v3s > 0 ? fmt.pct((campaign.v95 / campaign.v3s) * 100) : '0.00%',
          '100%': campaign.v3s > 0 ? fmt.pct((campaign.v100 / campaign.v3s) * 100) : '0.00%'
        } : null,
        historical: buildHistoryLines(campaign, monthsDesc)
      };
    }

    function buildPlatformCards(month, prev, monthsDesc, index, benchmarks) {
      const monthLabelsAsc = monthsDesc.slice(index, index + 3).reverse().map((item) => item.label);
      return month.platformBreakdown.map((platformRow) => {
        const platform = platformRow.platform;
        const rows = month.active.filter((item) => item.platform === platform);
        const currentSummary = summarizeCampaignSet(rows, benchmarks);
        const previousRows = prev ? prev.active.filter((item) => item.platform === platform) : [];
        const previousSummary = prev ? summarizeCampaignSet(previousRows, benchmarks) : null;
        const platformMonthsByLabel = Object.fromEntries(monthLabelsAsc.map((label) => {
          const sourceMonth = monthsDesc.find((entry) => entry.label === label);
          const sourceRows = sourceMonth ? sourceMonth.active.filter((item) => item.platform === platform) : [];
          return [label, summarizeCampaignSet(sourceRows, benchmarks)];
        }));
        const spendMom = calcMoM(currentSummary, previousSummary, 'spend', 'neutral');
        const reachMom = calcMoM(currentSummary, previousSummary, 'reach', 'higher-better');
        const cpmMom = calcMoM(currentSummary, previousSummary, 'cpm', 'lower-better');
        const cpeMom = calcMoM(currentSummary, previousSummary, 'cpe', 'lower-better');
        const engRateMom = calcMoM(currentSummary, previousSummary, 'engRate', 'higher-better');

        const formats = Object.entries(groupBy(rows, 'format')).map(([format, formatRows]) => {
          const spend = sumMetric(formatRows, 'spend');
          const budget = sumMetric(formatRows, 'budget');
          const budgetUtil = budget > 0 ? (spend / budget) * 100 : 100;
          const previousFormatRows = previousRows.filter((item) => item.format === format);
          const previousSpend = sumMetric(previousFormatRows, 'spend');
          return {
            format,
            ads: formatRows.length,
            spend,
            budget,
            budgetUtil,
            isNew: prev ? previousFormatRows.length === 0 : false,
            momSpend: previousRows.length ? calcMoM({ spend }, { spend: previousSpend }, 'spend', 'neutral') : null
          };
        }).sort((a, b) => b.spend - a.spend);

        const formatOrder = formats.map((item) => item.format);
        const typeRows = Object.entries(groupBy(rows, 'type')).map(([type, typeCampaigns]) => ({
          type,
          campaigns: typeCampaigns
        })).sort((a, b) => b.campaigns.length - a.campaigns.length);
        const pageRows = Object.entries(groupBy(rows, 'accountName')).map(([accountName, pageCampaigns]) => ({
          accountName,
          campaigns: pageCampaigns
        })).sort((a, b) => b.campaigns.length - a.campaigns.length);
        const bestCtr = rows.filter((item) => item.objective === 'Traffic').sort((a, b) => b.ctr - a.ctr).slice(0, 3);
        const bestNonClick = rows.filter((item) => item.objective === 'Engagement').sort((a, b) => b.nonClickEngRate - a.nonClickEngRate).slice(0, 3);
        const bestVtr = rows.filter((item) => item.hasAnyVideoMetrics && formatVtr(item) != null).sort((a, b) => (formatVtr(b) ?? -Infinity) - (formatVtr(a) ?? -Infinity)).slice(0, 3);

        return {
          platform,
          color: platformColors[platform] || '#00C9A7',
          descriptor: getPlatformDescriptor(platform),
          summary: currentSummary,
          spendValue: fmt.inr(currentSummary.spend),
          spendCopy: `Current spend in ${month.label}`,
          metrics: [
            { label: 'BLENDED CPM', value: fmt.cur0(currentSummary.cpm) },
            { label: 'BLENDED CPE', value: formatCpe(currentSummary.cpe, currentSummary.engagements) },
            { label: 'BLENDED ENG RATE', value: fmt.pct(currentSummary.engRate, 1) }
          ],
          changes: [
            { label: 'Spend', mom: spendMom, previousLabel: prev?.label || '' },
            { label: 'Reach', mom: reachMom, previousLabel: prev?.label || '' },
            { label: 'Blended CPM', mom: cpmMom, previousLabel: prev?.label || '' },
            { label: 'Blended CPE', mom: cpeMom, previousLabel: prev?.label || '' },
            { label: 'Blended Eng Rate', mom: engRateMom, previousLabel: prev?.label || '' }
          ].filter((item) => item.mom && item.previousLabel),
          popup: {
            budgetSummary: `Platform BU: ${fmt.pct(currentSummary.budgetUtil, 0)} · ${fmt.inr(currentSummary.spend)} spent of ${fmt.inr(currentSummary.budget)} budget · ${fmt.num(currentSummary.underDeliveredCount)} under-delivered ads`,
            spendByFormat: formats,
            formatBreakdown: formats,
            formatPlatformRows: rows,
            adsByType: typeRows,
            adsByPage: pageRows,
            momTable: makeMonthTable(monthLabelsAsc, buildMonthRows(monthLabelsAsc, platformMonthsByLabel, [
              { key: 'spend', label: 'Spend', changeLabel: 'Spend', direction: 'neutral', format: fmt.inr },
              { key: 'reach', label: 'Reach', changeLabel: 'Reach', direction: 'higher-better', format: fmt.num },
              { key: 'impressions', label: 'Impressions', changeLabel: 'Impressions', direction: 'higher-better', format: fmt.num },
              { key: 'cpm', label: 'Blended CPM', changeLabel: 'Blended CPM', direction: 'lower-better', format: fmt.cur0 },
              { key: 'cpe', label: 'Blended CPE', changeLabel: 'Blended CPE', direction: 'lower-better', format: (value, summary) => formatCpe(value, summary.engagements) },
              { key: 'engRate', label: 'Blended Eng Rate', changeLabel: 'Blended Eng Rate', direction: 'higher-better', format: (value) => fmt.pct(value, 2) }
            ])),
            bestAds: {
              ctr: bestCtr,
              nonClickEngRate: bestNonClick,
              vtr: bestVtr
            },
            formatOrder
          }
        };
      }).sort((a, b) => {
        const pref = ['Combined/Auto', 'Facebook', 'Instagram'];
        const ai = pref.indexOf(a.platform);
        const bi = pref.indexOf(b.platform);
        if (ai !== -1 || bi !== -1) return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
        return a.platform.localeCompare(b.platform);
      });
    }

    function buildFormatCards(month, prev, monthsDesc, index, benchmarks) {
      const currentRows = month.active.map((campaign) => ({ ...campaign, formatBucket: detectFormatBucket(campaign) }));
      const previousRowsAll = prev ? prev.active.map((campaign) => ({ ...campaign, formatBucket: detectFormatBucket(campaign) })) : [];
      const monthLabelsAsc = monthsDesc.slice(index, index + 3).reverse().map((item) => item.label);

      const engagementAds = currentRows.filter((campaign) => campaign.objective === 'Engagement');
      const trafficAds = currentRows.filter((campaign) => campaign.objective === 'Traffic');
      const awarenessAds = currentRows.filter((campaign) => /awareness|reach/i.test(String(campaign.objective || '')));
      const globalEmoBenchmark = avg(engagementAds.map((campaign) => {
        const emotionalEngagements = (campaign.engagements || 0) - (campaign.clicks || 0);
