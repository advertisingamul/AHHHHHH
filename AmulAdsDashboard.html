        return campaign.reach > 0 ? (emotionalEngagements / campaign.reach) * 100 : NaN;
      }));
      const avgCtrBenchmark = avg(trafficAds.map((campaign) => campaign.impressions > 0 ? (campaign.clicks / campaign.impressions) * 100 : NaN));
      const avgReachEfficiencyBenchmark = avg(awarenessAds.map((campaign) => campaign.spend > 0 ? campaign.reach / campaign.spend : NaN));
      const movedIgStaticCount = currentRows.filter((campaign) => {
        const raw = String(campaign.name || '').toLowerCase();
        const platform = String(campaign.platform || '').toLowerCase();
        const accountName = String(campaign.accountName || '').toLowerCase();
        return raw.includes('static') && Number(campaign.v3s || 0) > 0 && (platform.includes('instagram') || accountName.includes('instagram')) && detectFormatBucket(campaign) === 'VIDEO';
      }).length;

      const grouped = FORMAT_BUCKET_ORDER
        .map((bucket) => [bucket, currentRows.filter((campaign) => campaign.formatBucket === bucket)])
        .filter(([, rows]) => rows.length > 0);

      const cards = grouped.map(([bucket, rows]) => {
        const previousRows = previousRowsAll.filter((campaign) => campaign.formatBucket === bucket);
        const currentSummary = summarizeCampaignSet(rows, benchmarks);
        const previousSummary = prev ? summarizeCampaignSet(previousRows, benchmarks) : null;
        const distinctCampaignCount = new Set(rows.map((campaign) => getLogicalCampaignGroup(campaign))).size;
        const currentV3s = sumMetric(rows, 'v3s');
        const currentV100 = sumMetric(rows, 'v100');
        const completionRate = currentV3s > 0 ? (currentV100 / currentV3s) * 100 : null;
        const previousV3s = sumMetric(previousRows, 'v3s');
        const previousV100 = sumMetric(previousRows, 'v100');
        const previousCompletionRate = previousV3s > 0 ? (previousV100 / previousV3s) * 100 : 0;
        const spendMom = calcMoM(currentSummary, previousSummary, 'spend', 'neutral');
        const reachMom = calcMoM(currentSummary, previousSummary, 'reach', 'higher-better');
        const clicksMom = prev ? calcMoM({ clicks: sumMetric(rows, 'clicks') }, { clicks: sumMetric(previousRows, 'clicks') }, 'clicks', 'higher-better') : null;
        const impressionsMom = calcMoM(currentSummary, previousSummary, 'impressions', 'higher-better');
        const campaignsMom = prev ? calcMoM({ campaigns: distinctCampaignCount }, { campaigns: new Set(previousRows.map((campaign) => getLogicalCampaignGroup(campaign))).size }, 'campaigns', 'higher-better') : null;
        const completionMom = prev ? calcMoM({ completionRate: completionRate || 0 }, { completionRate: previousCompletionRate || 0 }, 'completionRate', 'higher-better') : null;
        const budgetUtilMom = calcMoM(currentSummary, previousSummary, 'budgetUtil', 'higher-better');

        const enrichedRows = rows.map((campaign) => {
          const hookRate = calculateHookRate(campaign);
          const holdRate = calculateHoldRate(campaign);
          const vtr = calculateVtr(campaign);
          const emoEngagements = (campaign.engagements || 0) - (campaign.clicks || 0);
          const emoERate = campaign.reach > 0 ? (emoEngagements / campaign.reach) * 100 : null;
          const ctr = campaign.impressions > 0 ? (campaign.clicks / campaign.impressions) * 100 : null;
          const reachEfficiency = campaign.spend > 0 ? campaign.reach / campaign.spend : null;
          return {
            ...campaign,
            hookRate,
            holdRate,
            vtr,
            emoERate,
            ctr,
            reachEfficiency
          };
        });

        const rowsByPlatform = Object.entries(groupBy(rows, 'platform')).map(([platform, platformRows]) => {
          const spend = sumMetric(platformRows, 'spend');
          const budget = sumMetric(platformRows, 'budget');
          return {
            platform,
            spend,
            budget,
            budgetUtil: budget > 0 ? (spend / budget) * 100 : 100,
            count: platformRows.length
          };
        }).sort((a, b) => b.spend - a.spend);

        const rowsByObjective = Object.entries(groupBy(rows, 'objective')).map(([objective, objectiveRows]) => ({
          objective,
          count: objectiveRows.length
        })).sort((a, b) => b.count - a.count);

        const rowsByPage = Object.entries(groupBy(rows, 'accountName')).map(([accountName, pageRows]) => ({
          accountName,
          count: pageRows.length
        })).filter((row) => row.accountName && row.accountName !== 'Unknown').sort((a, b) => b.count - a.count);

        const campaignGroupRows = Object.entries(groupBy(
          enrichedRows.map((campaign) => ({
            ...campaign,
            campaignGroup: getLogicalCampaignGroup(campaign)
          })),
          'campaignGroup'
        )).map(([name, campaigns]) => ({
          name,
          count: campaigns.length,
          byObjective: campaigns.reduce((acc, campaign) => {
            const objective = campaign.objective || 'Other';
            acc[objective] = (acc[objective] || 0) + 1;
            return acc;
          }, {})
        })).sort((a, b) => b.count - a.count || a.name.localeCompare(b.name));

        const videoAds = enrichedRows.filter((campaign) => campaign.hasAnyVideoMetrics);
        const averageMetric = (items, key) => {
          const values = items.map((item) => item[key]).filter((value) => Number.isFinite(value));
          return values.length ? avg(values) : null;
        };

        const videoMetrics = ['CAROUSEL', 'POST'].includes(bucket) && videoAds.length ? {
          ads: videoAds,
          summary: {
            count: videoAds.length,
            hookRate: averageMetric(videoAds.filter((campaign) => campaign.hookRate != null), 'hookRate'),
            holdRate: averageMetric(videoAds.filter((campaign) => campaign.holdRate != null), 'holdRate'),
            vtr: averageMetric(videoAds.filter((campaign) => campaign.vtr != null), 'vtr')
          }
        } : null;

        function buildMetricParts(items) {
          return items.map((item) => ({ label: item.label, value: item.value }));
        }

        function toCreativeRow(campaign, parts) {
          return {
            id: campaign.id,
            name: campaign.name,
            isShortVideo: campaign.isShortVideo,
            hookRate: campaign.hookRate,
            holdRate: campaign.holdRate,
            vtr: campaign.vtr,
            emoERate: campaign.emoERate,
            parts
          };
        }

        function buildFlagSection(key, title, description, tone, rowsForSection) {
          return { key, title, description, tone, rows: rowsForSection };
        }

        function topFive(items, sorter) {
          return [...items].sort(sorter).slice(0, 5);
        }

        const creativeAnalysis = bucket === 'VIDEO'
          ? {
              type: 'video',
              globalEmoBenchmark,
              poorHook: topFive(
                videoAds.filter((campaign) => campaign.hookRate != null && campaign.hookRate < 25),
                (a, b) => (a.hookRate || 0) - (b.hookRate || 0)
              ),
              poorHold: topFive(
                videoAds.filter((campaign) => campaign.holdRate != null && campaign.holdRate < 30),
                (a, b) => (a.holdRate || 0) - (b.holdRate || 0)
              ),
              highEmoLowVtr: topFive(
                videoAds.filter((campaign) => campaign.emoERate != null && campaign.emoERate > globalEmoBenchmark && campaign.vtr != null && campaign.vtr < 30),
                (a, b) => (a.vtr || 0) - (b.vtr || 0)
              )
            }
          : ['STATIC', 'CAROUSEL', 'POST'].includes(bucket)
            ? (() => {
                const sections = [];
                const engagementRows = enrichedRows.filter((campaign) => campaign.objective === 'Engagement');
                const trafficRows = enrichedRows.filter((campaign) => campaign.objective === 'Traffic');
                const awarenessRowsForFormat = enrichedRows.filter((campaign) => /awareness|reach/i.test(String(campaign.objective || '')));
                const avgStaticEngagementCpm = bucket === 'STATIC' ? avg(engagementRows.map((campaign) => campaign.cpm)) : 0;
                const avgFormatClicks = avg(enrichedRows.map((campaign) => campaign.clicks));

                if (engagementRows.length) {
                  sections.push(buildFlagSection(
                    'eng-top',
                    'Top Performers — Engagement',
                    'The top 5 ads with the highest emotional engagement rate this month. Use these as creative benchmarks.',
                    'positive',
                    [...engagementRows].sort((a, b) => (b.emoERate || 0) - (a.emoERate || 0)).slice(0, 5).map((campaign) => toCreativeRow(campaign, buildMetricParts([{ label: 'Non-Click Eng Rate', value: fmt.pct(campaign.emoERate || 0, 1) }])))
                  ));
                  sections.push(buildFlagSection(
                    'eng-poor',
                    'Poor Emotional Engagement',
                    'The 5 lowest performing ads below average Non-Click Eng Rate for engagement ads this month. Creative may not be resonating emotionally.',
                    'warning',
                    topFive(
                      engagementRows.filter((campaign) => (campaign.emoERate ?? -Infinity) < globalEmoBenchmark),
                      (a, b) => (a.emoERate || 0) - (b.emoERate || 0)
                    ).map((campaign) => toCreativeRow(campaign, buildMetricParts([{ label: 'Non-Click Eng Rate', value: fmt.pct(campaign.emoERate || 0, 1) }])))
                  ));
                  if (bucket === 'STATIC') {
                    sections.push(buildFlagSection(
                      'static-high-cpm-low-emo',
                      'High CPM, Low Emotional Engagement',
                      "The 5 most expensive ads spending above-average CPM while generating below-average emotional engagement. Expensive creative that isn't resonating.",
                      'warning',
                      topFive(
                        engagementRows.filter((campaign) => campaign.cpm > avgStaticEngagementCpm && (campaign.emoERate ?? Infinity) < globalEmoBenchmark),
                        (a, b) => (b.cpm || 0) - (a.cpm || 0)
                      ).map((campaign) => toCreativeRow(campaign, buildMetricParts([
                          { label: 'CPM', value: fmt.cur0(campaign.cpm) },
                          { label: 'Non-Click Eng Rate', value: fmt.pct(campaign.emoERate || 0, 1) }
                        ])))
                    ));
                  }
                }

                if (trafficRows.length) {
                  sections.push(buildFlagSection(
                    'traffic-top',
                    'Top Performers — Traffic',
                    'The top 5 ads with the highest CTR among traffic ads this month.',
                    'positive',
                    [...trafficRows].sort((a, b) => (b.ctr || 0) - (a.ctr || 0)).slice(0, 5).map((campaign) => toCreativeRow(campaign, buildMetricParts([{ label: 'CTR', value: fmt.pct(campaign.ctr || 0, 1) }])))
                  ));
                  sections.push(buildFlagSection(
                    'traffic-poor',
                    'Poor Click-Through Rate',
                    'The 5 lowest performing ads below average CTR for traffic ads this month. Landing page or creative relevance may need review.',
                    'warning',
                    topFive(
                      trafficRows.filter((campaign) => (campaign.ctr ?? Infinity) < avgCtrBenchmark),
                      (a, b) => (a.ctr || 0) - (b.ctr || 0)
                    ).map((campaign) => toCreativeRow(campaign, buildMetricParts([{ label: 'CTR', value: fmt.pct(campaign.ctr || 0, 1) }])))
                  ));
                }

                if (awarenessRowsForFormat.length) {
                  sections.push(buildFlagSection(
                    'aware-top',
                    'High Reach — Top Performers',
                    'The top 5 ads delivering the most unique reach this month. Strong candidates for scaling.',
                    'interesting',
                    [...awarenessRowsForFormat].sort((a, b) => (b.reach || 0) - (a.reach || 0)).slice(0, 5).map((campaign) => toCreativeRow(campaign, buildMetricParts([{ label: 'Reach', value: fmt.num(campaign.reach || 0) }])))
                  ));
                  sections.push(buildFlagSection(
                    'aware-low-eff',
                    'Low Reach Efficiency',
                    'The 5 lowest reach-efficiency ads below average reach per rupee spent. Audience overlap or targeting may be limiting unique reach.',
                    'warning',
                    topFive(
                      awarenessRowsForFormat.filter((campaign) => (campaign.reachEfficiency ?? Infinity) < avgReachEfficiencyBenchmark),
                      (a, b) => (a.reachEfficiency || 0) - (b.reachEfficiency || 0)
                    ).map((campaign) => toCreativeRow(campaign, buildMetricParts([{ label: 'Reach Efficiency', value: `${(campaign.reachEfficiency || 0).toFixed(2)}` }])))
                  ));
                }

                if (bucket === 'STATIC') {
                  sections.push(buildFlagSection(
                    'static-not-working',
                    'Not Working',
                    'The 5 weakest ads performing below average on both emotional engagement and link clicks. Neither emotionally nor functionally effective.',
                    'critical',
                    topFive(
                      enrichedRows.filter((campaign) => (campaign.emoERate ?? Infinity) < globalEmoBenchmark && (campaign.clicks ?? Infinity) < avgFormatClicks),
                      (a, b) => (a.emoERate || 0) - (b.emoERate || 0)
                    ).map((campaign) => toCreativeRow(campaign, buildMetricParts([
                        { label: 'Non-Click Eng Rate', value: fmt.pct(campaign.emoERate || 0, 1) },
                        { label: 'Link Clicks', value: fmt.num(campaign.clicks || 0) }
                      ])))
                  ));
                }

                if (bucket === 'CAROUSEL') {
                  sections.push(buildFlagSection(
                    'carousel-not-working',
                    'Not Working',
                    'The 5 weakest carousel ads performing below average on both emotional engagement and link clicks.',
                    'critical',
                    topFive(
                      enrichedRows.filter((campaign) => (campaign.emoERate ?? Infinity) < globalEmoBenchmark && (campaign.clicks ?? Infinity) < avgFormatClicks),
                      (a, b) => (a.emoERate || 0) - (b.emoERate || 0)
                    ).map((campaign) => toCreativeRow(campaign, buildMetricParts([
                        { label: 'Non-Click Eng Rate', value: fmt.pct(campaign.emoERate || 0, 1) },
                        { label: 'Link Clicks', value: fmt.num(campaign.clicks || 0) }
                      ])))
                  ));
                }

                return {
                  type: 'objective',
                  sections: sections.filter((section) => section.rows.length || section.title)
                };
              })()
            : null;

        const monthsByLabel = Object.fromEntries(monthLabelsAsc.map((label) => {
          const sourceMonth = monthsDesc.find((entry) => entry.label === label);
          const sourceRows = sourceMonth ? sourceMonth.active.filter((campaign) => detectFormatBucket(campaign) === bucket) : [];
          const sourceSummary = summarizeCampaignSet(sourceRows, benchmarks);
          return [label, {
            ...sourceSummary,
            clicks: sumMetric(sourceRows, 'clicks')
          }];
        }));

        return {
          bucket,
          label: bucket,
          color: getFormatBucketColor(bucket),
          count: rows.length,
          campaignCount: distinctCampaignCount,
          monthLabel: formatFullMonthLabel(month.month),
          previousLabel: prev?.label || '',
          spendValue: fmtLakhs(currentSummary.spend),
          spendMom,
          metrics: [
            { label: 'SPEND', value: fmtLakhs(currentSummary.spend) },
            { label: 'REACH', value: fmt.num(currentSummary.reach) },
            { label: 'CAMPAIGNS', value: fmt.num(distinctCampaignCount) },
            ...(bucket === 'VIDEO' ? [{ label: 'COMPLETION RATE', value: completionRate != null ? fmt.pct(completionRate, 1) : '—' }] : [])
          ],
          popup: {
            overviewMetrics: [
              { label: 'SPEND', value: fmt.inr(currentSummary.spend), change: spendMom ? `${spendMom.label} vs ${prev?.label}` : '--', tone: toneFromMom(spendMom) },
              { label: 'REACH', value: fmt.num(currentSummary.reach), change: reachMom ? `${reachMom.label} vs ${prev?.label}` : '--', tone: toneFromMom(reachMom) },
              { label: 'IMPRESSIONS', value: fmt.num(currentSummary.impressions), change: impressionsMom ? `${impressionsMom.label} vs ${prev?.label}` : '--', tone: toneFromMom(impressionsMom) },
              { label: 'BUDGET UTILISATION', value: fmt.pct(currentSummary.budgetUtil, 0), change: budgetUtilMom ? `${budgetUtilMom.label} vs ${prev?.label}` : '--', tone: toneFromMom(budgetUtilMom) },
              { label: 'CAMPAIGNS', value: fmt.num(distinctCampaignCount), change: campaignsMom ? `${campaignsMom.label} vs ${prev?.label}` : '--', tone: toneFromMom(campaignsMom) },
              { label: 'LINK CLICKS', value: fmt.num(sumMetric(rows, 'clicks')), change: clicksMom ? `${clicksMom.label} vs ${prev?.label}` : '--', tone: toneFromMom(clicksMom) },
              ...(bucket === 'VIDEO' ? [{ label: 'COMPLETION RATE', value: completionRate != null ? fmt.pct(completionRate, 1) : '—', change: completionMom ? `${completionMom.label} vs ${prev?.label}` : '--', tone: toneFromMom(completionMom) }] : [])
            ],
            platformRows: rowsByPlatform,
            objectiveRows: rowsByObjective,
            pageRows: rowsByPage,
            campaignGroupRows,
            formatPlatformRows: rows,
            averageBenchmarks: {
              emoERate: globalEmoBenchmark,
              ctr: avgCtrBenchmark,
              reachEfficiency: avgReachEfficiencyBenchmark
            },
            videoMetrics,
            creativeAnalysis,
            momTable: makeMonthTable(monthLabelsAsc, buildMonthRows(monthLabelsAsc, monthsByLabel, [
              { key: 'spend', label: 'Spend', changeLabel: 'Spend', direction: 'neutral', format: fmt.inr },
              { key: 'reach', label: 'Reach', changeLabel: 'Reach', direction: 'higher-better', format: fmt.num },
              { key: 'impressions', label: 'Impressions', changeLabel: 'Impressions', direction: 'higher-better', format: fmt.num },
              { key: 'cpm', label: 'Blended CPM', changeLabel: 'Blended CPM', direction: 'lower-better', format: fmt.cur0 },
              { key: 'cpe', label: 'Blended CPE', changeLabel: 'Blended CPE', direction: 'lower-better', format: (value, sourceSummary) => formatCpe(value, sourceSummary.engagements) },
              { key: 'engRate', label: 'Blended Eng Rate', changeLabel: 'Blended Eng Rate', direction: 'higher-better', format: (value) => fmt.pct(value, 2) }
            ]))
          }
        };
      });

      return {
        cards,
        globalEmoBenchmark,
        avgCtrBenchmark,
        avgReachEfficiencyBenchmark,
        movedIgStaticCount
      };
    }

    function buildCampaignCards(month, prev, monthsDesc, index, benchmarks, insights = {}) {
      const grouped = Object.entries(groupBy(
        month.active
          .filter((campaign) => getLogicalCampaignGroup(campaign))
          .map((campaign) => ({ ...campaign, campaignGroup: getLogicalCampaignGroup(campaign) })),
        'campaignGroup'
      ))
        .filter(([name]) => name && name !== 'Unknown')
        .sort((a, b) => sumMetric(b[1], 'spend') - sumMetric(a[1], 'spend'));
      const totalSpend = sumMetric(month.active, 'spend');
      const totalReach = sumMetric(month.active, 'reach');
      const campaignCount = grouped.length;
      const previousCampaignRows = prev?.active || [];
      const previousTotalSpend = sumMetric(previousCampaignRows, 'spend');
      const spendMom = prev ? calcMoM({ spend: totalSpend }, { spend: previousTotalSpend }, 'spend', 'neutral') : null;

      const campaignItems = grouped.map(([name, rows]) => {
        const currentSummary = summarizeCampaignSet(rows, benchmarks);
        const objectives = [...new Set(rows.map((campaign) => campaign.objective).filter(Boolean))];
        const hasEngagementObjective = objectives.includes('Engagement');
        const hasTrafficObjective = objectives.includes('Traffic');
        const hasAwarenessObjective = objectives.some((value) => /awareness|reach/i.test(String(value)));
        const objectiveGroup = objectiveGroupForValues(objectives);
        const objectiveLabel = objectives.length === 1 ? objectives[0] : objectives.length ? 'Mixed Objectives' : 'Other';
        const previousRows = previousCampaignRows.filter((campaign) => getLogicalCampaignGroup(campaign) === name);
        const previousSummary = prev ? summarizeCampaignSet(previousRows, benchmarks) : null;
        const spendMomLocal = calcMoM(currentSummary, previousSummary, 'spend', 'neutral');
        const reachMom = calcMoM(currentSummary, previousSummary, 'reach', 'higher-better');
        const impressionsMom = calcMoM(currentSummary, previousSummary, 'impressions', 'higher-better');
        const budgetUtilMom = calcMoM(currentSummary, previousSummary, 'budgetUtil', 'higher-better');
        const cpmMom = calcMoM(currentSummary, previousSummary, 'cpm', 'lower-better');
        const reachEfficiency = currentSummary.spend > 0 ? currentSummary.reach / currentSummary.spend : 0;
        const previousReachEfficiency = previousSummary?.spend > 0 ? previousSummary.reach / previousSummary.spend : 0;
        const reachEfficiencyMom = previousSummary ? calcMoM({ reachEfficiency }, { reachEfficiency: previousReachEfficiency }, 'pagePerf', 'higher-better') : null;
        const totalNonClickEng = Math.max(sumMetric(rows, 'engagements') - sumMetric(rows, 'clicks'), 0);
        const nonClickEngRateAll = currentSummary.reach > 0 ? (totalNonClickEng / currentSummary.reach) * 100 : 0;
        const enrichedRows = rows.map((campaign) => {
          const emoERate = campaign.reach > 0 ? (Math.max(0, (campaign.engagements || 0) - (campaign.clicks || 0)) / campaign.reach) * 100 : 0;
          const reachEff = campaign.spend > 0 ? campaign.reach / campaign.spend : 0;
          const hookRate = calculateHookRate(campaign);
          const holdRate = calculateHoldRate(campaign);
          const vtr = calculateVtr(campaign);
          return { ...campaign, emoERate, reachEfficiency: reachEff, hookRate, holdRate, vtr, campaignSubtype: detectCampaignSubtype(campaign.name) };
        });
        const engagementRows = enrichedRows.filter((campaign) => campaign.objective === 'Engagement');
        const trafficRows = enrichedRows.filter((campaign) => campaign.objective === 'Traffic');
        const awarenessRows = enrichedRows.filter((campaign) => /awareness|reach/i.test(String(campaign.objective || '')));
        const hasVideoMetrics = enrichedRows.some((campaign) => campaign.hasAnyVideoMetrics);
        const completionRate = sumMetric(rows, 'v3s') > 0 ? (sumMetric(rows, 'v100') / sumMetric(rows, 'v3s')) * 100 : null;
        const avgHookRateValues = enrichedRows.filter((campaign) => campaign.hookRate != null).map((campaign) => campaign.hookRate);
        const avgHoldRateValues = enrichedRows.filter((campaign) => campaign.holdRate != null).map((campaign) => campaign.holdRate);
        const avgHookRate = avgHookRateValues.length ? avg(avgHookRateValues) : null;
        const avgHoldRate = avgHoldRateValues.length ? avg(avgHoldRateValues) : null;
        const objectiveSpecificMetrics = (() => {
          if (objectiveGroup === 'ENGAGEMENT') {
            const nonClickEngRate = currentSummary.reach > 0 ? (sumMetric(rows, 'engagements') - sumMetric(rows, 'clicks')) / currentSummary.reach * 100 : 0;
            const nonClickEngRateMom = previousSummary ? calcMoM({ nonClickEngRate }, { nonClickEngRate: previousSummary.reach > 0 ? ((sumMetric(previousRows, 'engagements') - sumMetric(previousRows, 'clicks')) / previousSummary.reach) * 100 : 0 }, 'engRate', 'higher-better') : null;
            const cpeMom = calcMoM(currentSummary, previousSummary, 'cpe', 'lower-better');
            return {
              metrics: [
                { label: 'Non-Click Eng Rate', value: fmt.pct(nonClickEngRate, 2), mom: nonClickEngRateMom },
                { label: 'Blended CPE', value: formatCpe(currentSummary.cpe, currentSummary.engagements), mom: cpeMom }
              ]
            };
          }
          if (objectiveGroup === 'TRAFFIC') {
            const ctr = currentSummary.impressions > 0 ? (sumMetric(rows, 'clicks') / currentSummary.impressions) * 100 : 0;
            const prevCtr = previousSummary?.impressions > 0 ? (sumMetric(previousRows, 'clicks') / previousSummary.impressions) * 100 : 0;
            const ctrMom = previousSummary ? calcMoM({ ctr }, { ctr: prevCtr }, 'ctr', 'higher-better') : null;
            const clicks = sumMetric(rows, 'clicks');
            const prevClicks = sumMetric(previousRows, 'clicks');
            const clicksMom = prev ? calcMoM({ campaigns: clicks }, { campaigns: prevClicks }, 'campaigns', 'higher-better') : null;
            return {
              metrics: [
                { label: 'CTR', value: fmt.pct(ctr, 2), mom: ctrMom },
                { label: 'Link Clicks', value: fmt.num(clicks), mom: clicksMom }
              ]
            };
          }
          return { metrics: [] };
        })();

        function sectionRows(items, metricPartsBuilder) {
          return items.map((campaign) => ({
            id: campaign.id,
            name: campaign.name,
            isShortVideo: campaign.isShortVideo,
            hookRate: campaign.hookRate,
            holdRate: campaign.holdRate,
            vtr: campaign.vtr,
            emoERate: campaign.emoERate,
            parts: metricPartsBuilder(campaign)
          }));
        }

        const creativeSections = [];
        if (engagementRows.length) {
          creativeSections.push({
            key: 'eng-top',
            title: 'Top Performers — Engagement',
            description: 'The top 5 ads with the highest Non-Click Eng Rate this month. Use these as creative benchmarks.',
            tone: 'positive',
            rows: sectionRows(top5(engagementRows, 'emoERate', 'higher'), (campaign) => [{ label: 'Non-Click Eng Rate', value: fmt.pct(campaign.emoERate || 0, 2) }])
          });
          creativeSections.push({
            key: 'eng-poor',
            title: 'Poor Non-Click Engagement',
            description: 'The 5 lowest performing ads below average Non-Click Eng Rate this month.',
            tone: 'warning',
            rows: [...engagementRows]
              .filter((campaign) => (campaign.emoERate ?? Infinity) < (insights.globalEmoBenchmark ?? Infinity))
              .sort((a, b) => (a.emoERate || 0) - (b.emoERate || 0))
              .slice(0, 5)
              .map((campaign) => sectionRows([campaign], (item) => [{ label: 'Non-Click Eng Rate', value: fmt.pct(item.emoERate || 0, 2) }])[0])
          });
          const engagementVideoRows = engagementRows.filter((campaign) => campaign.hookRate != null);
          if (engagementVideoRows.length) {
            creativeSections.push({
              key: 'video-hook',
              title: 'Poor Hook Rate',
              description: 'The 5 worst-performing video ads where fewer than 25% of impressions resulted in a 3-second view.',
              tone: 'warning',
              rows: [...engagementVideoRows]
                .filter((campaign) => (campaign.hookRate ?? Infinity) < 25)
                .sort((a, b) => (a.hookRate || 0) - (b.hookRate || 0))
                .slice(0, 5)
                .map((campaign) => sectionRows([campaign], (item) => [{ label: 'Hook Rate', value: item.hookRate != null ? fmt.pct(item.hookRate, 2) : '—' }])[0])
            });
            creativeSections.push({
              key: 'video-hold',
              title: 'Poor Hold Rate',
              description: 'The 5 weakest video ads where fewer than 30% of hooked viewers reached the Hold Rate threshold for their video type.',
              tone: 'warning',
              rows: [...engagementVideoRows]
                .filter((campaign) => (campaign.holdRate ?? Infinity) < 30)
                .sort((a, b) => (a.holdRate || 0) - (b.holdRate || 0))
                .slice(0, 5)
                .map((campaign) => sectionRows([campaign], (item) => [{ label: 'Hold Rate', value: item.holdRate != null ? fmt.pct(item.holdRate, 2) : '—' }])[0])
            });
            creativeSections.push({
              key: 'video-emo-vtr',
              title: 'Emotionally Resonant, Low Completion',
              description: "These ads drive strong emotional reactions but viewers aren't watching to completion. The creative is connecting but may be too long or lose momentum mid-way. Consider cutting to a shorter format or moving the hook earlier.",
              tone: 'interesting',
              rows: [...engagementVideoRows]
                .filter((campaign) => (campaign.emoERate ?? -Infinity) > (insights.globalEmoBenchmark ?? Infinity) && (campaign.vtr ?? Infinity) < 30)
                .sort((a, b) => (a.vtr || 0) - (b.vtr || 0))
                .slice(0, 5)
                .map((campaign) => sectionRows([campaign], (item) => [
                  { label: 'Non-Click Eng Rate', value: fmt.pct(item.emoERate || 0, 2) },
                  { label: 'VTR', value: item.vtr != null ? fmt.pct(item.vtr, 2) : '—' }
                ])[0])
            });
          }
        }
        if (trafficRows.length) {
          creativeSections.push({
            key: 'traffic-top',
            title: 'Top Performers — Traffic',
            description: 'The top 5 ads with the highest CTR among traffic ads in this campaign.',
            tone: 'positive',
            rows: sectionRows(top5(trafficRows, 'ctr', 'higher'), (campaign) => [{ label: 'CTR', value: fmt.pct(campaign.ctr || 0, 2) }])
          });
          creativeSections.push({
            key: 'traffic-poor',
            title: 'Poor Click-Through Rate',
            description: 'The 5 lowest performing ads below average CTR for traffic ads this month.',
            tone: 'warning',
            rows: [...trafficRows]
              .filter((campaign) => (campaign.ctr ?? Infinity) < (insights.avgCtrBenchmark ?? Infinity))
              .sort((a, b) => (a.ctr || 0) - (b.ctr || 0))
              .slice(0, 5)
              .map((campaign) => sectionRows([campaign], (item) => [{ label: 'CTR', value: fmt.pct(item.ctr || 0, 2) }])[0])
          });
        }
        if (awarenessRows.length) {
          creativeSections.push({
            key: 'aware-top',
            title: 'High Reach — Top Performers',
            description: 'The top 5 ads delivering the highest reach in this awareness campaign.',
            tone: 'interesting',
            rows: sectionRows(top5(awarenessRows, 'reach', 'higher'), (campaign) => [{ label: 'Reach', value: fmt.num(campaign.reach || 0) }])
          });
          creativeSections.push({
            key: 'aware-poor',
            title: 'Low Reach Efficiency',
            description: 'The 5 lowest reach-efficiency ads below average reach-per-rupee benchmark.',
            tone: 'warning',
            rows: [...awarenessRows]
              .filter((campaign) => (campaign.reachEfficiency ?? Infinity) < (insights.avgReachEfficiencyBenchmark ?? Infinity))
              .sort((a, b) => (a.reachEfficiency || 0) - (b.reachEfficiency || 0))
              .slice(0, 5)
              .map((campaign) => sectionRows([campaign], (item) => [{ label: 'Reach Efficiency', value: `${(item.reachEfficiency || 0).toFixed(2)}` }])[0])
          });
        }

        const platformRows = Object.entries(groupBy(rows, 'platform')).map(([platform, items]) => {
          const spend = sumMetric(items, 'spend');
          const budget = sumMetric(items, 'budget');
          return {
            platform,
            spend,
            budget,
            budgetUtil: budget > 0 ? (spend / budget) * 100 : 100,
            count: items.length
          };
        }).sort((a, b) => b.spend - a.spend);
        const pageRows = Object.entries(groupBy(rows, 'accountName')).map(([accountName, items]) => ({
          accountName,
          count: items.length
        })).filter((row) => row.accountName && row.accountName !== 'Unknown').sort((a, b) => b.count - a.count);
        const formatPlatformRows = Object.entries(groupBy(enrichedRows, 'format')).map(([format, items]) => ({
          format,
          byPlatform: Object.entries(groupBy(items, 'platform')).reduce((acc, [platform, platformRows]) => {
            acc[platform] = platformRows.length;
            return acc;
          }, {})
        })).sort((a, b) => Object.values(b.byPlatform).reduce((s, v) => s + v, 0) - Object.values(a.byPlatform).reduce((s, v) => s + v, 0));
        const objectiveRows = Object.entries(groupBy(rows, 'objective')).map(([objective, items]) => ({
          objective,
          count: items.length
        })).sort((a, b) => b.count - a.count);
        const popupMetrics = [
          { label: 'SPEND', value: fmt.inr(currentSummary.spend), change: spendMomLocal ? `${spendMomLocal.label} vs ${prev?.label}` : '--', tone: toneFromMom(spendMomLocal) },
          { label: 'REACH', value: fmt.num(currentSummary.reach), change: reachMom ? `${reachMom.label} vs ${prev?.label}` : '--', tone: toneFromMom(reachMom) },
          { label: 'IMPRESSIONS', value: fmt.num(currentSummary.impressions), change: impressionsMom ? `${impressionsMom.label} vs ${prev?.label}` : '--', tone: toneFromMom(impressionsMom) },
          { label: 'BUDGET UTILISATION', value: fmt.pct(currentSummary.budgetUtil, 0), change: budgetUtilMom ? `${budgetUtilMom.label} vs ${prev?.label}` : '--', tone: toneFromMom(budgetUtilMom) },
          { label: 'NON-CLICK ENG', value: fmt.num(totalNonClickEng), change: '--', tone: 'neutral' },
          { label: 'NON-CLICK ENG RATE', value: fmt.pct(nonClickEngRateAll, 2), change: '--', tone: 'neutral', descriptor: getMetricDescriptor('nonClickEngRate') },
          { label: 'BLENDED CPM', value: fmt.cur1(currentSummary.cpm), change: cpmMom ? `${cpmMom.label} vs ${prev?.label}` : '--', tone: toneFromMom(cpmMom) },
          { label: 'Reach Efficiency', value: reachEfficiency.toFixed(2), change: reachEfficiencyMom ? `${reachEfficiencyMom.label} vs ${prev?.label}` : '--', tone: toneFromMom(reachEfficiencyMom) }
        ];
        if (objectiveGroup === 'ENGAGEMENT') popupMetrics.push(...objectiveSpecificMetrics.metrics.map((metric) => ({ ...metric, tone: metric.mom ? toneFromMom(metric.mom) : 'neutral', change: metric.mom ? `${metric.mom.label} vs ${prev?.label}` : '--' })));
        if (objectiveGroup === 'TRAFFIC') popupMetrics.push(...objectiveSpecificMetrics.metrics.map((metric) => ({ ...metric, tone: metric.mom ? toneFromMom(metric.mom) : 'neutral', change: metric.mom ? `${metric.mom.label} vs ${prev?.label}` : '--' })));
        if (hasVideoMetrics) {
          const prevVideoRows = previousRows.filter((campaign) => campaign.hasAnyVideoMetrics);
          const prevCompletion = sumMetric(previousRows, 'v3s') > 0 ? (sumMetric(previousRows, 'v100') / sumMetric(previousRows, 'v3s')) * 100 : 0;
          const prevHook = avg(prevVideoRows.map((campaign) => calculateHookRate(campaign)));
          const prevHold = avg(prevVideoRows.map((campaign) => calculateHoldRate(campaign)));
          popupMetrics.push(
            { label: 'COMPLETION RATE', value: completionRate != null ? fmt.pct(completionRate, 1) : '—', change: prev ? `${calcMoM({ completionRate: completionRate || 0 }, { completionRate: prevCompletion || 0 }, 'completionRate', 'higher-better')?.label || '--'} vs ${prev?.label}` : '--', tone: prev ? toneFromMom(calcMoM({ completionRate: completionRate || 0 }, { completionRate: prevCompletion || 0 }, 'completionRate', 'higher-better')) : 'neutral' },
            { label: 'Hook Rate', value: Number.isFinite(avgHookRate) ? fmt.pct(avgHookRate, 1) : '—', change: prev ? `${calcMoM({ ctr: avgHookRate || 0 }, { ctr: prevHook || 0 }, 'ctr', 'higher-better')?.label || '--'} vs ${prev?.label}` : '--', tone: prev ? toneFromMom(calcMoM({ ctr: avgHookRate || 0 }, { ctr: prevHook || 0 }, 'ctr', 'higher-better')) : 'neutral' },
            { label: 'Hold Rate', value: Number.isFinite(avgHoldRate) ? fmt.pct(avgHoldRate, 1) : '—', change: prev ? `${calcMoM({ completionRate: avgHoldRate || 0 }, { completionRate: prevHold || 0 }, 'completionRate', 'higher-better')?.label || '--'} vs ${prev?.label}` : '--', tone: prev ? toneFromMom(calcMoM({ completionRate: avgHoldRate || 0 }, { completionRate: prevHold || 0 }, 'completionRate', 'higher-better')) : 'neutral' }
          );
        }

        const cardMetrics = (() => {
          const base = hasAwarenessObjective && !hasEngagementObjective && !hasTrafficObjective
            ? [
                { label: 'SPEND', value: fmtLakhs(currentSummary.spend) },
                { label: 'REACH', value: fmt.num(currentSummary.reach) },
                { label: 'TOTAL ENG', value: fmt.num(currentSummary.engagements) },
                { label: 'REACH EFFICIENCY', value: reachEfficiency.toFixed(2) },
                { label: 'BLENDED CPM', value: fmt.cur1(currentSummary.cpm) }
              ]
            : [
                { label: 'SPEND', value: fmtLakhs(currentSummary.spend) },
                { label: 'REACH', value: fmt.num(currentSummary.reach) },
                { label: 'TOTAL ENG', value: fmt.num(currentSummary.engagements) },
                { label: 'BLENDED CPM', value: fmt.cur1(currentSummary.cpm) },
                { label: 'REACH EFFICIENCY', value: reachEfficiency.toFixed(2) }
              ];
          if (hasEngagementObjective) {
            const nonClickEngRate = currentSummary.reach > 0 ? (sumMetric(rows, 'engagements') - sumMetric(rows, 'clicks')) / currentSummary.reach * 100 : 0;
            base.push({ label: 'NON-CLICK ENG RATE', value: fmt.pct(nonClickEngRate, 2) });
            base.push({ label: 'BLENDED CPE', value: formatCpe(currentSummary.cpe, currentSummary.engagements) });
          }
          if (hasTrafficObjective) {
            const ctr = currentSummary.impressions > 0 ? (sumMetric(rows, 'clicks') / currentSummary.impressions) * 100 : 0;
            base.push({ label: 'CTR', value: fmt.pct(ctr, 2) });
            base.push({ label: 'LINK CLICKS', value: fmt.num(sumMetric(rows, 'clicks')) });
          }
          return base;
        })();

        return {
          name,
          count: rows.length,
          objectiveGroup,
          objectiveLabel,
          objectiveTone: objectiveToneForGroup(objectiveGroup),
          previousLabel: prev?.label || '',
          spendMom: buildMoMLabelAbsoluteOnly('Spend', spendMomLocal, prev?.label, 'spend'),
          summary: currentSummary,
          spendValue: fmtLakhs(currentSummary.spend),
          cardMetrics,
          campaignPages: [...new Set(rows.map((campaign) => campaign.accountName).filter(Boolean))],
          popup: {
            objectives,
            hasMultipleObjectives: objectives.length > 1,
            platformRows,
            pageRows,
            formatPlatformRows,
            objectiveRows,
            overviewMetrics: popupMetrics,
            creativeSections,
            hasVideoMetrics,
            subtitle: `${fmt.num(rows.length)} ads · ${fmt.inr(currentSummary.spend)} spent · ${fmt.num(currentSummary.reach)} reach`
          }
        };
      });

      const groupLabels = {
        ENGAGEMENT: 'Engagement Campaigns',
        TRAFFIC: 'Traffic Campaigns',
        AWARENESS: 'Awareness Campaigns',
        OTHER: 'Other'
      };

      const groups = ['ENGAGEMENT', 'TRAFFIC', 'AWARENESS', 'OTHER'].map((groupKey) => ({
        key: groupKey,
        title: groupLabels[groupKey],
        items: campaignItems.filter((item) => item.objectiveGroup === groupKey),
        emptyMessage: groupKey === 'AWARENESS' ? 'No awareness campaigns this month.' : `No ${groupLabels[groupKey].toLowerCase()} this month.`
      }));

      return {
        overview: {
          count: campaignCount,
          totalSpend,
          totalReach,
          spendMom,
          previousLabel: prev?.label || ''
        },
        groups,
        items: campaignItems
      };
    }

    function buildPageCards(month, prev, monthsDesc, index, benchmarks) {
      const grouped = Object.entries(groupBy(month.active, 'accountName'))
        .filter(([accountName]) => accountName && accountName !== 'Unknown')
        .sort((a, b) => sumMetric(b[1], 'spend') - sumMetric(a[1], 'spend'));
      const sortedPageNames = [...grouped.map(([accountName]) => accountName)].sort((a, b) => a.localeCompare(b));

      return grouped.map(([accountName, rows]) => {
        const currentSummary = summarizeCampaignSet(rows, benchmarks);
        const currentPagePerf = currentSummary.spend > 0 ? currentSummary.reach / currentSummary.spend : 0;
        const previousRows = prev ? prev.active.filter((item) => item.accountName === accountName) : [];
        const previousSummary = prev ? summarizeCampaignSet(previousRows, benchmarks) : null;
        const previousPagePerf = previousSummary && previousSummary.spend > 0 ? previousSummary.reach / previousSummary.spend : 0;
        const spendMom = calcMoM(currentSummary, previousSummary, 'spend', 'neutral');
        const reachMom = calcMoM(currentSummary, previousSummary, 'reach', 'higher-better');
        const cpmMom = calcMoM(currentSummary, previousSummary, 'cpm', 'lower-better');
        const cpeMom = calcMoM(currentSummary, previousSummary, 'cpe', 'lower-better');
        const engRateMom = calcMoM(currentSummary, previousSummary, 'engRate', 'higher-better');
        const pagePerfMom = previousSummary ? calcMoM({ pagePerf: currentPagePerf }, { pagePerf: previousPagePerf }, 'pagePerf', 'higher-better') : null;
        const campaignTypes = [...new Set(rows.map((item) => item.type))];

        const formats = Object.entries(groupBy(rows, 'format')).map(([format, formatRows]) => {
          const spend = sumMetric(formatRows, 'spend');
          const budget = sumMetric(formatRows, 'budget');
          const budgetUtil = budget > 0 ? (spend / budget) * 100 : 100;
          const previousFormatRows = previousRows.filter((item) => item.format === format);
          const previousSpend = sumMetric(previousFormatRows, 'spend');
          return {
            format,
            ads: formatRows.length,
            spend,
            budget,
            budgetUtil,
            isNew: prev ? previousFormatRows.length === 0 : false,
            momSpend: previousRows.length ? calcMoM({ spend }, { spend: previousSpend }, 'spend', 'neutral') : null
          };
        }).sort((a, b) => b.spend - a.spend);

        const typeBreakdown = Object.entries(groupBy(rows, 'type')).map(([type, typeRows]) => {
          const spend = sumMetric(typeRows, 'spend');
          const previousTypeRows = previousRows.filter((item) => item.type === type);
          const previousSpend = sumMetric(previousTypeRows, 'spend');
          return {
            type,
            ads: typeRows.length,
            spend,
            spendShare: currentSummary.spend > 0 ? (spend / currentSummary.spend) * 100 : 0,
            isNew: prev ? previousTypeRows.length === 0 : false,
            momSpend: previousRows.length ? calcMoM({ spend }, { spend: previousSpend }, 'spend', 'neutral') : null,
            campaigns: typeRows
          };
        }).sort((a, b) => b.spend - a.spend);
        const topTypeSummary = typeBreakdown.slice(0, 3).map((row) => `${row.type} ${fmt.inr(row.spend)}`);
        const campaignSpendSummary = `${topTypeSummary.join(' · ')}${typeBreakdown.length > 3 ? ` · +${typeBreakdown.length - 3} more` : ''}`;

        const bestNonClick = rows.filter((item) => item.objective === 'Engagement').sort((a, b) => b.nonClickEngRate - a.nonClickEngRate).slice(0, 3);
        const bestCtr = rows.filter((item) => item.objective === 'Traffic').sort((a, b) => b.ctr - a.ctr).slice(0, 3);
        const bestVtr = rows.filter((item) => item.hasAnyVideoMetrics && formatVtr(item) != null).sort((a, b) => (formatVtr(b) ?? -Infinity) - (formatVtr(a) ?? -Infinity)).slice(0, 3);

        return {
          accountName,
          color: getPageColor(sortedPageNames.indexOf(accountName)),
          count: rows.length,
          monthLabel: formatFullMonthLabel(month.month),
          previousLabel: prev?.label || '',
          campaignTypeCount: campaignTypes.length,
          descriptor: `Meta delivery and spend mix for ${formatFullMonthLabel(month.month)}`,
          campaignSpendSummary,
          summary: currentSummary,
          pagePerf: currentPagePerf,
          budgetUtilValue: fmt.pct(currentSummary.budgetUtil, 0),
          budgetUtilTone: utilTone(currentSummary.budgetUtil),
          budgetSpentText: `${fmt.inr(currentSummary.spend)} spent of ${fmt.inr(currentSummary.budget)} budget`,
          underDeliveredLabel: `${fmt.num(currentSummary.underDeliveredCount)} under-delivered ads`,
          spendValue: fmt.inr(currentSummary.spend),
          spendDescriptor: `${formatFullMonthLabel(month.month)} spend across all formats`,
          metrics: [
            { label: 'BLENDED CPM', value: fmt.cur0(currentSummary.cpm) },
            { label: 'BLENDED CPE', value: formatCpe(currentSummary.cpe, currentSummary.engagements) },
            { label: 'Reach', value: fmt.num(currentSummary.reach) },
            { label: 'BLENDED ENG RATE', value: fmt.pct(currentSummary.engRate, 1) }
          ],
          pagePerfMom,
          spendMom,
          summaryChanges: [
            { label: 'Reach', mom: reachMom },
            { label: 'Blended CPM', mom: cpmMom },
            { label: 'Blended CPE', mom: cpeMom },
            { label: 'Blended Eng Rate', mom: engRateMom }
          ].filter((item) => item.mom),
          popup: {
            subtitle: `${fmt.num(rows.length)} ads · ${fmt.inr(currentSummary.spend)} spent of ${fmt.inr(currentSummary.budget)} budget · BU ${fmt.pct(currentSummary.budgetUtil, 0)} · ${fmt.num(currentSummary.underDeliveredCount)} under-delivered ads`,
            formats,
            formatPlatformRows: rows,
            typeBreakdown,
            bestAds: {
              nonClick: bestNonClick,
              ctr: bestCtr,
              vtr: bestVtr
            }
          }
        };
      });
    }

    function getPagesOverviewData(activeCampaigns, allCampaigns = activeCampaigns, inactiveCampaigns = []) {
      const pages = groupBy(allCampaigns, 'accountName');
      return Object.entries(pages)
        .filter(([pageName]) => pageName && pageName !== 'Unknown')
        .map(([pageName, ads]) => ({
          pageName,
          totalSpend: sumMetric(ads, 'spend'),
          totalBudget: sumMetric(ads, 'budget'),
          totalReach: sumMetric(ads, 'reach'),
          totalImp: sumMetric(ads, 'impressions'),
          cpm: sumMetric(ads, 'impressions') > 0 ? (sumMetric(ads, 'spend') / sumMetric(ads, 'impressions')) * 1000 : 0,
          budgetUtil: sumMetric(ads, 'budget') > 0 ? (sumMetric(ads, 'spend') / sumMetric(ads, 'budget')) * 100 : 100,
          adCount: ads.length,
          activeAdCount: activeCampaigns.filter((item) => item.accountName === pageName).length,
          inactiveAdCount: inactiveCampaigns.filter((item) => item.accountName === pageName).length
        }))
        .sort((a, b) => b.totalSpend - a.totalSpend);
    }

    function buildPagesOverview(month, prev, monthsDesc, index, pageCards) {
      const rows = getPagesOverviewData(month.active, month.all, month.inactive).map((row) => ({
        ...row,
        color: pageCards.find((page) => page.accountName === row.pageName)?.color || getPageColor(0)
      }));
      const totalSpend = rows.reduce((sum, row) => sum + row.totalSpend, 0);
      const previousTotalSpend = prev ? getPagesOverviewData(prev.active, prev.all, prev.inactive).reduce((sum, row) => sum + row.totalSpend, 0) : 0;
      const spendMom = prev ? calcMoM({ spend: totalSpend }, { spend: previousTotalSpend }, 'spend', 'neutral') : null;

      return {
        count: rows.length,
        totalSpend,
        spendValue: fmt.num(rows.length),
        countLabel: 'pages analysed',
        spendSummary: `Total ${fmt.inr(totalSpend)} across all pages`,
        descriptor: `Cross-page comparison for ${formatFullMonthLabel(month.month)}`,
        spendMom,
        previousLabel: prev?.label || '',
        popup: {
          rows
        }
      };
    }

    function buildDashboardData(rawDatasets, benchmarks, activeDateFilter = dateFilter) {
      if (!rawDatasets.length) return { months: [], byLabel: {} };

      const monthsDesc = rawDatasets
        .map((dataset) => {
          const filteredCampaignsBase = filterCampaignsByDate(dataset.campaignsBase, activeDateFilter);
          // In this dashboard:
          // activeCampaigns/inactiveCampaigns count individual ads (rows),
          // while typeBreakdown groups those ads into campaign themes/types.
          const classified = classifyActive(filteredCampaignsBase.map((campaign) => ({ ...campaign, datasetLabel: dataset.label, datasetMonth: dataset.month })), benchmarks);
          const untaggedCategories = {
            namingConvention: dedupeCampaignsByName(classified.all.filter((c) => c.type === 'Untagged')),
            format: dedupeCampaignsByName(classified.all.filter((c) => c.format === 'Untagged')),
            platform: dedupeCampaignsByName(classified.all.filter((c) => c.platformFromMeta)),
            date: dedupeCampaignsByName(classified.all.filter((c) => !c.date))
          };
          const untagged = dedupeCampaignsByName([
            ...untaggedCategories.namingConvention,
            ...untaggedCategories.format,
            ...untaggedCategories.platform,
            ...untaggedCategories.date
          ]);
          const activeTypeBreakdown = typeAggregates(classified.active);
          const inactiveTypeBreakdown = typeAggregates(classified.inactive);
          const summary = {
            totalSpend: sumMetric(classified.active, 'spend'),
            totalBudget: sumMetric(classified.all, 'budget'),
            budgetUtil: sumMetric(classified.all, 'budget') > 0 ? (sumMetric(classified.active, 'spend') / sumMetric(classified.all, 'budget')) * 100 : 100,
            totalReach: sumMetric(classified.active, 'reach'),
            totalImpressions: sumMetric(classified.active, 'impressions'),
            activeCampaigns: classified.active.length,
            campaignTypes: activeTypeBreakdown.length,
            inactiveCampaigns: classified.inactive.length,
            wastedSpend: sumMetric(classified.inactive, 'spend')
          };
          return {
            ...dataset,
            ...classified,
            untagged,
            untaggedCategories,
            summary,
            platformBreakdown: platformAggregates(classified.active),
            objectiveBreakdown: objectiveAggregates(classified.active),
            typeBreakdown: activeTypeBreakdown,
            inactiveTypeBreakdown,
            formatBreakdown: formatAggregates(classified.active),
            pageBreakdown: pageAggregates(classified.active),
            calendar: calendarData(classified.active, dataset.month)
          };
        })
        .sort((a, b) => b.month - a.month);

      const summariesByLabel = Object.fromEntries(monthsDesc.map((month) => [month.label, month.summary]));
      const activityOverview = buildActivityOverview(monthsDesc);
      const byLabel = {};

      monthsDesc.forEach((month, index) => {
        const prev = monthsDesc[index + 1];
        const monthsAsc = monthsDesc.slice(index, index + 3).reverse().map((item) => item.label);
        const summary = month.summary;
        const mom = {
          spend: calcMoM(summary, prev?.summary, 'totalSpend', 'neutral'),
          budgetUtil: calcMoM(summary, prev?.summary, 'budgetUtil', 'higher-better'),
          reach: calcMoM(summary, prev?.summary, 'totalReach', 'higher-better'),
          impressions: calcMoM(summary, prev?.summary, 'totalImpressions', 'higher-better'),
          campaigns: calcMoM(summary, prev?.summary, 'activeCampaigns', 'higher-better'),
          campaignTypes: calcMoM(summary, prev?.summary, 'campaignTypes', 'higher-better')
        };
        const platformCards = buildPlatformCards(month, prev, monthsDesc, index, benchmarks);
        const formatData = buildFormatCards(month, prev, monthsDesc, index, benchmarks);
        const campaignData = buildCampaignCards(month, prev, monthsDesc, index, benchmarks, {
          globalEmoBenchmark: formatData.globalEmoBenchmark,
          avgCtrBenchmark: formatData.avgCtrBenchmark,
          avgReachEfficiencyBenchmark: formatData.avgReachEfficiencyBenchmark
        });
        const pageCards = buildPageCards(month, prev, monthsDesc, index, benchmarks);
        const pagesOverview = buildPagesOverview(month, prev, monthsDesc, index, pageCards);
        const signals = calculateCreativeOpportunity(month.active, benchmarks, month.label);
        const missedOpportunities = calculateMissedOpportunities(month.active, benchmarks, month.label);
        const signalCount = countSignalEntries(signals);
        const signalSummary = summarizeSignalTypes(signals);
        const groupedSignals = signalGroups(signals);
        const activeRows = month.active.map((campaign) => ({
          ...campaign,
          name: campaign.name,
          type: campaign.type,
          platform: campaign.platform,
          format: campaign.format,
          objective: campaign.objective,
          accountName: campaign.accountName,
          spend: campaign.spend,
          impressions: campaign.impressions,
          clicks: campaign.clicks,
          ctr: campaign.objective === 'Traffic' ? campaign.ctr : null,
          rawCtr: campaign.ctr,
          cpm: campaign.cpm,
          cpe: campaign.cpe,
          engRate: campaign.engRate,
          budgetUtil: campaign.budgetUtil,
          budget: campaign.budget,
          primaryMetric: formatMetricDescriptor(campaign, 'primary'),
          secondaryMetric: formatMetricDescriptor(campaign, 'secondary')
        }));
        const inactiveData = {
          inactive: month.inactive
            .sort((a, b) => a.budgetUtil - b.budgetUtil)
            .map((c) => ({
              ...c,
              primaryMetric: formatMetricDescriptor(c, 'primary')
            })),
          poorPerforming: month.active.filter((c) => {
            if (c.objective === 'Traffic') return c.ctr < benchmarks.trafficPoorCTR;
            if (c.objective === 'Engagement') return c.engRate < benchmarks.engagementPoorRate;
            if (c.objective === 'Awareness') return c.cpm > benchmarks.awarenesspoorCPM;
            return false;
          }).map((c) => ({
            ...c,
            primaryDescriptor: getObjectiveMetric(c, 'primary'),
            primaryMetric: formatMetricDescriptor(c, 'primary')
          }))
        };

        const overviewData = {
          totalSpend: summary.totalSpend,
          totalBudget: summary.totalBudget,
          budgetUtil: summary.budgetUtil,
          totalReach: summary.totalReach,
          totalImpressions: summary.totalImpressions,
          activeCampaigns: summary.activeCampaigns,
          inactiveCampaigns: summary.inactiveCampaigns,
          wastedSpend: summary.wastedSpend,
          mom,
          platformBreakdown: month.platformBreakdown,
          objectiveBreakdown: month.objectiveBreakdown,
          typeBreakdown: month.typeBreakdown,
          topBudgetUtil: top5(month.active, 'budgetUtil', 'higher'),
          bottomBudgetUtil: bottom5(month.active, 'budgetUtil', 'higher'),
          topReach: top5(month.active, 'reach', 'higher'),
          bottomReach: bottom5(month.active, 'reach', 'higher'),
          topImpressions: top5(month.active, 'impressions', 'higher'),
          bottomImpressions: bottom5(month.active, 'impressions', 'higher'),
          signals,
          missedOpportunities,
          signalCount,
          signalSummary,
          groupedSignals,
          activity: activityOverview,
          calendar: {
            current: month.calendar,
            historical: monthsDesc.slice(index + 1, index + 3).map((m) => ({ label: m.label, calendar: m.calendar }))
          },
          stats: {
            spend: {
              label: 'Total Spend',

    function ChartCanvas({ type, data, options, onPointClick }) {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);
      useEffect(() => {
        if (!canvasRef.current) return;
        const chartOptions = {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { labels: { usePointStyle: true, boxWidth: 8, boxHeight: 8 } },
            tooltip: { callbacks: options?.plugins?.tooltip?.callbacks || {} }
          },
          ...options
        };
        const customPlugins = options?.customPlugins || [];
        if (!chartRef.current || chartRef.current.config.type !== type) {
          chartRef.current?.destroy();
          chartRef.current = new Chart(canvasRef.current, {
            type,
            data,
            options: chartOptions,
            plugins: customPlugins
          });
        } else {
          chartRef.current.data = data;
          chartRef.current.options = chartOptions;
          chartRef.current.config.plugins = customPlugins;
          chartRef.current.update();
        }
        if (onPointClick) {
          chartRef.current.canvas.onclick = (evt) => {
            const points = chartRef.current.getElementsAtEventForMode(evt, 'nearest', { intersect: true }, true);
            if (points.length) onPointClick(points[0]);
          };
        }
        return () => {
          if (chartRef.current) {
            chartRef.current.destroy();
            chartRef.current = null;
          }
        };
      }, [type, data, options, onPointClick]);
      return <canvas ref={canvasRef}></canvas>;
    }

    function Modal({ title, subtitle, onClose, children, modalId, maxWidth }) {
      const modalRef = useRef(null);
      const modalBodyRef = useRef(null);
      const [showIndicator, setShowIndicator] = useState(false);
      const [showChevron, setShowChevron] = useState(false);

      useEffect(() => {
        const popup = modalBodyRef.current;
        if (!popup) return undefined;
        let hideTimer = null;

        function updateScrollIndicator() {
          const atBottom = popup.scrollTop + popup.clientHeight >= popup.scrollHeight - 10;
          const hasOverflow = popup.scrollHeight > popup.clientHeight + 10;
          setShowIndicator(hasOverflow && !atBottom);
        }

        const onScroll = () => updateScrollIndicator();
        popup.addEventListener('scroll', onScroll);
        window.addEventListener('resize', updateScrollIndicator);
        window.requestAnimationFrame(() => {
          updateScrollIndicator();
          const hasOverflow = popup.scrollHeight > popup.clientHeight + 10;
          setShowChevron(hasOverflow);
          if (hasOverflow) {
            hideTimer = window.setTimeout(() => setShowChevron(false), 1500);
          }
        });

        return () => {
          popup.removeEventListener('scroll', onScroll);
          window.removeEventListener('resize', updateScrollIndicator);
          if (hideTimer) window.clearTimeout(hideTimer);
        };
      }, [children, title, subtitle]);

        return (
        <div className="backdrop" onClick={onClose}>
          <div className="modal-card" id={modalId} ref={modalRef} style={maxWidth ? { width: `min(${maxWidth}px, calc(100vw - 48px))` } : undefined} onClick={(e) => e.stopPropagation()}>
            <div className="modal-head">
              <div>
                <div className="modal-title">{title}</div>
                {subtitle ? <div className="modal-subtitle">{subtitle}</div> : null}
              </div>
              <button className="close-button" onClick={onClose} aria-label="Close modal">{closeSvg}</button>
            </div>
            <div className="modal-body" ref={modalBodyRef}>
              <div className="modal-body-content">
                {children}
              </div>
              {showIndicator ? <div className="modal-scroll-indicator">{showChevron ? <div className="modal-scroll-chevron">↓</div> : null}</div> : null}
            </div>
          </div>
        </div>
      );
    }

    function OverviewTab({ monthData, currentLabel, onOpenModal, festivalEvents: activeFestivalEvents = [], festivalMarkerEnabled, onToggleFestivalMarkers }) {
      const activity = monthData.overviewData.activity;
      const [activityFocus, setActivityFocus] = useState(null);
      const labels = Array.from({ length: 31 }, (_, i) => String(i + 1));
      const activityMonths = activity.months || [];
      const displayMonths = [...activityMonths].reverse();
      const visibleActivityLabels = activityFocus ? [activityFocus] : displayMonths.map((entry) => entry.label);
      const selectedFestivalMonthLabel = activityFocus || currentLabel;
      const selectedFestivalMonthColor = activityMonths.find((entry) => entry.label === selectedFestivalMonthLabel)?.color || '#00C9A7';
      const festivalEventLookup = useMemo(() => {
        const byMonthDay = {};
        const byDay = {};
        (activeFestivalEvents || []).forEach((event) => {
          const parsed = parseDateFilterValue(event.date);
          if (!parsed) return;
          const monthLabel = formatMonthLabel(parsed);
          if (monthLabel !== selectedFestivalMonthLabel) return;
          const day = parsed.getDate();
          const monthDayKey = `${monthLabel}-${day}`;
          byMonthDay[monthDayKey] = byMonthDay[monthDayKey] || [];
          byMonthDay[monthDayKey].push(event);
          byDay[day] = byDay[day] || [];
          byDay[day].push(event);
        });
        return { byMonthDay, byDay };
      }, [activeFestivalEvents, selectedFestivalMonthLabel]);
      const festivalMarkerPlugin = useMemo(() => ({
        id: `festival-markers-${selectedFestivalMonthLabel}-${festivalMarkerEnabled ? 'on' : 'off'}`,
        afterDatasetsDraw(chart) {
          if (!festivalMarkerEnabled) return;
          const xScale = chart.scales.x;
          const chartArea = chart.chartArea;
          if (!xScale || !chartArea) return;
          Object.entries(festivalEventLookup.byDay).forEach(([day, events]) => {
            if (!events?.length) return;
            const index = Number(day) - 1;
            const x = xScale.getPixelForValue(index);
            const { ctx } = chart;
            ctx.save();
            ctx.strokeStyle = selectedFestivalMonthColor;
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            ctx.globalAlpha = 0.6;
            ctx.beginPath();
            ctx.moveTo(x, chartArea.top + 8);
            ctx.lineTo(x, chartArea.bottom);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = selectedFestivalMonthColor;
            ctx.beginPath();
            ctx.moveTo(x, chartArea.top);
            ctx.lineTo(x - 5, chartArea.top + 8);
            ctx.lineTo(x + 5, chartArea.top + 8);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
          });
        }
      }), [festivalEventLookup, festivalMarkerEnabled, selectedFestivalMonthColor, selectedFestivalMonthLabel]);
      useEffect(() => {
        if (activityFocus && !activityMonths.some((month) => month.label === activityFocus)) {
          setActivityFocus(null);
        }
      }, [activityFocus, activityMonths]);
      const activityData = {

            <button className="card creative-card clickable small-stat-card" onClick={() => onOpenModal('creative')}>

        const rows = data.campaigns.filter((item) => {
          const query = search.trim().toLowerCase();
          if (query && !item.name.toLowerCase().includes(query)) return false;
          if (filters.objective !== 'All' && item.objective !== filters.objective) return false;
          if (filters.platform !== 'All' && item.platform !== filters.platform) return false;
          if (filters.type !== 'All' && item.type !== filters.type) return false;
          if (filters.format !== 'All' && item.format !== filters.format) return false;
          if (untaggedOnly && item.type !== 'Untagged' && item.format !== 'Untagged') return false;
          return true;
        });
        return [...rows].sort((a, b) => {
          const dir = sort.dir === 'asc' ? 1 : -1;
          const av = a[sort.col];
          const bv = b[sort.col];
          if (av == null && bv == null) return 0;
          if (av == null) return 1;
          if (bv == null) return -1;
          return typeof av === 'string' ? av.localeCompare(bv) * dir : (av - bv) * dir;
        });
      }, [data.campaigns, filters, search, sort, untaggedOnly]);

      function setSortCol(col) {
        setSort((prev) => prev.col === col ? { col, dir: prev.dir === 'desc' ? 'asc' : 'desc' } : { col, dir: col === 'ctr' ? 'desc' : 'asc' });
      }

      return (

                <col className="type-col" />
                <col className="platform-col" />
                <col className="format-col" />
                <col className="objective-col" />
                <col className="spend-col" />
                <col className="impr-col" />
                <col className="ctr-col" />
                <col className="cpm-col" />

                <col className="budget-col" />
              </colgroup>
              <thead>
                <tr>
                  <th>Ad Name</th>
                  <th>Campaign</th>
                  <th>Platform</th>
                  <th>Format</th>
                  <th>Objective</th>
                  {['spend', 'impressions', 'ctr', 'cpm', 'cpe', 'engRate', 'budgetUtil'].map((col, idx) => (
                    <th key={col}><button className="sort-button" onClick={() => setSortCol(col)}>{['Spend', 'Impr', 'CTR*', 'CPM', 'CPE', 'Eng%', 'Budget%'][idx]} {sort.col === col ? (sort.dir === 'desc' ? '↓' : '↑') : ''}</button></th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.map((item) => (
                  <tr key={item.id} className="table-row-hover" onClick={() => onOpenPanel(item.id)}>
                    <td title={item.name}>
                      <AdNameCell item={item} onCopy={onCopy} />
                    </td>
                    <td>{item.type}</td>
                    <td>{item.platform}</td>
                    <td>{item.format}</td>
                    <td>{item.objective}</td>
                    <td className="num">{fmt.inr(item.spend)}</td>
                    <td className="num">{fmt.num(item.impressions)}</td>
                    <td className={`num ${item.objective === 'Traffic' ? (item.rawCtr >= ctrBenchmark ? 'teal' : 'amber') : ''}`}>{item.ctr == null ? '--' : fmt.pct(item.ctr)}</td>

        const label = formatEventMonthLabel(event.date);

        acc[label].push(event);
        return acc;
      }, {});

      useEffect(() => {
        setDrafts(Object.fromEntries(Object.entries(benchmarks).map(([key, value]) => [key, String(value)])));
      }, [benchmarks]);

      function commitDraft(key) {
        onBenchmarkChange(key, drafts[key]);
      }

      function updateCalendarRow(index, field, value) {
        setUserCalendarIds((prev) => prev.map((row, rowIndex) => rowIndex === index ? { ...row, [field]: value } : row));
      }

      function addCalendarRow() {
        setUserCalendarIds((prev) => [...prev, { id: '', nickname: '' }]);
      }

      function removeCalendarRow(index) {
        setUserCalendarIds((prev) => prev.filter((_, rowIndex) => rowIndex !== index));
      }

      function addUserEvent() {
        const today = new Date();
        const date = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
        setUserFestivalEvents((prev) => [...prev, {
          id: `user-${Date.now()}`,
          date,
          name: '',
          type: 'festival',
          calendarId: '',
          source: 'user',
          nickname: ''
        }]);
      }

      function updateUserEvent(eventId, field, value) {
        setUserFestivalEvents((prev) => prev.map((event) => event.id === eventId ? { ...event, [field]: value } : event));
      }

      function deleteUserEvent(eventId) {
        setUserFestivalEvents((prev) => prev.filter((event) => event.id !== eventId));
      }

      function toggleHiddenApiEvent(event) {
        const signature = makeFestivalEventSignature(event.date, event.name);
        setHiddenFestivalEvents((prev) => prev.includes(signature) ? prev.filter((item) => item !== signature) : [...prev, signature]);

                  <div className="bench-desc">{field.desc}</div>
                  <input

                <div className="calendar-month-group" key={monthLabel}>
                  <div className="calendar-month-title">{monthLabel}</div>
                  {events.map((event) => {
                    const isUser = event.source === 'user';

                    return (
                      <div className="calendar-row compact" key={event.id || signature}>

                        <select className="bench-input" value={event.type || 'festival'} disabled={!isUser} onChange={(e) => isUser && updateUserEvent(event.id, 'type', e.target.value)}>

    function DateModal({ monthData, day, onClose, openPanel, onCopy, popupId }) {
      const [openSections, setOpenSections] = useState({ running: false, continuing: false });
      const payload = typeof day === 'object' && day !== null ? day : { day, label: monthData.label };
      const activityMonth = monthData.overviewData.activity.byLabel[payload.label] || monthData.overviewData.activity.months[0];
      const date = new Date(activityMonth.month.getFullYear(), activityMonth.month.getMonth(), payload.day);
      const key = localDateKey(date);
      const rows = activityMonth.byDate[key] || [];
      const runningRows = rows.filter((row) => !(row.reportingEnd && monthKey(row.reportingEnd) === nextMonthKey(date)));
      const continuingRows = rows.filter((row) => row.reportingEnd && monthKey(row.reportingEnd) === nextMonthKey(date));
      const pageRows = Object.entries(groupBy(rows, 'accountName'))
        .map(([accountName, pageItems], idx) => {
          const spend = sumMetric(pageItems, 'spend');
          const budget = sumMetric(pageItems, 'budget');
          return {
            accountName: accountName || 'Unknown Page',
            adCount: pageItems.length,
            reach: sumMetric(pageItems, 'reach'),
            impressions: sumMetric(pageItems, 'impressions'),
            spend,
            budget,
            bu: budget > 0 ? (spend / budget) * 100 : null,
            color: getPageColor(idx)
          };
        })
        .filter((row) => row.adCount > 0)
        .sort((a, b) => b.adCount - a.adCount || b.spend - a.spend);
      const pageTotals = pageRows.reduce((acc, row) => {
        acc.adCount += row.adCount;
        acc.reach += row.reach;

    async function readWorkbook(file) {
      const buffer = await file.arrayBuffer();
      const workbook = XLSX.read(buffer, { type: 'array' });
      const sheet = getValidatedRawDataSheet(workbook, file.name);
      const month = detectReportingPeriod(sheet, file.name);
      const rows = parseRows(sheet);
      return {
        name: file.name,
        label: formatMonthLabel(month),
        rows,
        month: new Date(month.getFullYear(), month.getMonth(), 1),
        campaignsBase: rows.map((row, idx) => calculateCampaign(row, idx))
      };
    }

    function processDatasets(datasets) {
      return datasets
        .map((dataset) => {
          const month = dataset.month instanceof Date ? dataset.month : new Date(dataset.month);
          const rows = dataset.rows || [];
          return {
            ...dataset,
            label: dataset.label || formatMonthLabel(month),
            month: new Date(month.getFullYear(), month.getMonth(), 1),
            rows,
            campaignsBase: dataset.campaignsBase || rows.map((row, idx) => calculateCampaign(row, idx))
          };
        })
        .sort((a, b) => b.month - a.month);
    }

    function fileToBase64(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (e) => resolve(e.target.result);
        reader.readAsDataURL(file);
      });
    }

    function saveFilesToStorage(fileDataArray) {
      try {
        localStorage.setItem('amul_dash_files', JSON.stringify(fileDataArray));
        localStorage.setItem('amul_dash_saved_at', new Date().toISOString());
        return { ok: true };
      } catch (e) {
        console.warn('Could not save files to localStorage:', e);
        return { ok: false, error: e };
      }
    }

    function checkSavedFiles() {
      try {
        const saved = localStorage.getItem('amul_dash_files');
        const savedAt = localStorage.getItem('amul_dash_saved_at');
        if (!saved) return null;
        return { files: JSON.parse(saved), savedAt: savedAt ? new Date(savedAt) : null };
      } catch (e) {
        return { error: e };
      }
    }

    function clearSavedFiles() {
      localStorage.removeItem('amul_dash_files');
      localStorage.removeItem('amul_dash_saved_at');
    }

    async function restoreFromStorage(savedFiles) {
      const processed = [];
      for (const saved of savedFiles) {
        const base64 = String(saved.data || '').split(',')[1];
        if (!base64) throw new Error('Missing base64 data');
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i += 1) {
          bytes[i] = binary.charCodeAt(i);
        }
        const arrayBuffer = bytes.buffer;
        const workbook = XLSX.read(arrayBuffer, { type: 'array' });
        const sheet = getValidatedRawDataSheet(workbook, saved.name || 'restored file');
        const rows = parseRows(sheet);
        const month = saved.month ? new Date(saved.month) : detectReportingPeriod(sheet, saved.name || '');
        processed.push({
          name: saved.name,
          label: saved.label || formatMonthLabel(month),
          month: new Date(month.getFullYear(), month.getMonth(), 1),
          rows
        });
      }
      return processDatasets(processed);
    }

      return res.json();

        return stored == null ? true : stored === 'true';
      });
