      const [uploadMessage, setUploadMessage] = useState('');
      const [restoreBanner, setRestoreBanner] = useState(null);
      const fileInputRef = useRef(null);

      useEffect(() => {
        if (!toast) return;
        const timer = window.setTimeout(() => setToast(''), 2000);
        return () => window.clearTimeout(timer);
      }, [toast]);

      useEffect(() => {
        let cancelled = false;
        async function boot() {
          // 1. Try server first — any team member sees the latest shared data
          try {
            const serverData = await fetchDatasetsFromServer();
            if (cancelled) return;
            if (Array.isArray(serverData?.files) && serverData.files.length) {
              const restored = await restoreFromStorage(serverData.files);
              if (!restored.some((d) => d.campaignsBase.length)) throw new Error('No valid rows in server data');
              setRawDatasets(restored);
              setSelectedLabel(restored[0]?.label || '');
              setRestoreBanner({
                labels: restored.map((item) => item.label),
                savedAt: serverData.savedAt ? new Date(serverData.savedAt) : null,
                source: 'server'
              });
              setIsBooting(false);
              return;
            }
          } catch (err) {
            if (cancelled) return;
            console.warn('Server data unavailable, falling back to localStorage:', err.message);
          }
          // 2. Fall back to localStorage
          const saved = checkSavedFiles();
          if (saved?.error) {
            clearSavedFiles();
            setUploadMessage('Previous session could not be restored — please upload your files again');
            setIsBooting(false);
            return;
          }
          if (!saved?.files?.length) {
            setIsBooting(false);
            return;
          }
          restoreFromStorage(saved.files)
            .then((restored) => {
              if (cancelled) return;
              if (!restored.some((dataset) => dataset.campaignsBase.length)) {
                throw new Error('No valid restored rows');
              }
              setRawDatasets(restored);
              setSelectedLabel(restored[0]?.label || '');
              setRestoreBanner({
                labels: restored.map((item) => item.label),
                savedAt: saved.savedAt,
                source: 'local'
              });
              setIsBooting(false);
            })
            .catch((error) => {
              console.error(error);
              clearSavedFiles();
              if (cancelled) return;
              setUploadMessage('Previous session could not be restored — please upload your files again');
              setIsBooting(false);
            });
        }
        boot();
        return () => { cancelled = true; };
      }, []);

      useEffect(() => {
        if (!restoreBanner) return undefined;
        const timer = window.setTimeout(() => setRestoreBanner(null), 5000);
        const onScroll = () => setRestoreBanner(null);
        window.addEventListener('scroll', onScroll, { passive: true });
        return () => {
          window.clearTimeout(timer);
          window.removeEventListener('scroll', onScroll);
        };
      }, [restoreBanner]);

      const normalizedDateFilter = useMemo(() => ({
        from: parseDateFilterValue(dateFilterInputs.from, false),
        to: parseDateFilterValue(dateFilterInputs.to, true)
      }), [dateFilterInputs]);

      useEffect(() => {
        dateFilter = normalizedDateFilter;
      }, [normalizedDateFilter]);

      useEffect(() => {
        showFestivalMarkers = festivalMarkerEnabled;
        localStorage.setItem(SHOW_FESTIVAL_MARKERS_STORAGE_KEY, String(festivalMarkerEnabled));
      }, [festivalMarkerEnabled]);

      useEffect(() => {
        saveStoredJson(USER_CALENDAR_IDS_STORAGE_KEY, userCalendarIds);
      }, [userCalendarIds]);

      useEffect(() => {
        saveStoredJson(USER_FESTIVAL_EVENTS_STORAGE_KEY, userFestivalEvents);
      }, [userFestivalEvents]);

      useEffect(() => {
        saveStoredJson(HIDDEN_GCAL_EVENTS_STORAGE_KEY, hiddenFestivalEvents);
      }, [hiddenFestivalEvents]);

      // Fetch shared benchmarks from server on mount
      useEffect(() => {
        fetchBenchmarksFromServer()
          .then((b) => { if (b && typeof b === 'object') setBenchmarks((prev) => ({ ...prev, ...b })); })
          .catch(() => {});
      }, []);

      const festivalYears = useMemo(() => [...new Set((rawDatasets || []).map((dataset) => dataset?.month?.getFullYear?.()).filter(Number.isFinite))], [rawDatasets]);
      const activeCalendarIds = useMemo(() => [
        DEFAULT_INDIAN_HOLIDAY_CALENDAR_ID,
        ...userCalendarIds.map((row) => String(row?.id || '').trim()).filter(Boolean)
      ], [userCalendarIds]);

      useEffect(() => {
        let cancelled = false;
        async function syncFestivalEvents() {
          let fetchedApiEvents = [];
          let errorMessage = '';
          if (festivalYears.length) {
            try {
              fetchedApiEvents = await fetchCalendarEventsFromBackend(activeCalendarIds, festivalYears);
            } catch (error) {
              console.error(error);
              errorMessage = 'Could not fetch events — check the server calendar endpoint.';
            }
          }
          if (cancelled) return;
          const merged = buildFestivalEvents(fetchedApiEvents, userFestivalEvents, hiddenFestivalEvents);
          const editorRows = buildFestivalEditorEvents(fetchedApiEvents, userFestivalEvents, hiddenFestivalEvents, userCalendarIds);
          setApiFestivalEvents(fetchedApiEvents);
          setFestivalEditorEvents(editorRows);
          setFestivalEventsState(merged);
          setFestivalFetchError(errorMessage);
        }
        syncFestivalEvents();
        return () => {
          cancelled = true;
        };
      }, [activeCalendarIds, festivalYears, userCalendarIds, userFestivalEvents, hiddenFestivalEvents]);

      const dashboard = useMemo(() => buildDashboardData(rawDatasets, benchmarks, normalizedDateFilter), [rawDatasets, benchmarks, normalizedDateFilter]);
      const currentLabel = selectedLabel || dashboard.months[0]?.label || '';
      const monthData = dashboard.byLabel[currentLabel] || null;

      useEffect(() => {
        if (dashboard.months.length && !dashboard.byLabel[selectedLabel]) {
          setSelectedLabel(dashboard.months[0].label);
        }
      }, [dashboard, selectedLabel]);

      function showToast(message = 'Copied to clipboard') {
        setToast(message);
      }

      function triggerUpload() {
        fileInputRef.current?.click();
      }

      async function handleFiles(event) {
        const files = Array.from(event.target.files || []);
        if (!files.length) return;
        if (files.length > 3) {
          window.alert('Maximum 3 months supported');
          event.target.value = '';
          return;
        }
        try {
          const uploads = await Promise.all(files.map(async (file) => {
            const parsed = await readWorkbook(file);
            const data = await fileToBase64(file);
            return {
              parsed,
              saved: {
                name: file.name,
                data,
                label: parsed.label,
                month: parsed.month.toISOString()
              }
            };
          }));
          const parsed = processDatasets(uploads.map((item) => item.parsed));
          if (!parsed.some((dataset) => dataset.campaignsBase.length)) {
            window.alert('No valid campaign rows found');
            event.target.value = '';
            return;
          }
          setRawDatasets(parsed);
          setSelectedLabel(parsed[0]?.label || '');
          resetDateFilter();
          setActiveTab('Overview');
          setModal(null);
          setPanelState(null);
          setUntaggedOnly(false);
          setUploadMessage('');
          setRestoreBanner(null);
          const filePayload = uploads.map((item) => item.saved);
          const saveResult = saveFilesToStorage(filePayload);
          syncDatasetsToServer(filePayload).catch((err) => console.warn('Server sync failed:', err.message));
          if (!saveResult.ok) {
            showToast('Could not save files locally — storage full');
          } else {
            showToast('Files updated and saved');
          }
        } catch (error) {
          console.error(error);
          window.alert(error?.message || 'Failed to parse one or more files');
        }
        event.target.value = '';
      }

      function onBenchmarkChange(key, value) {
        const parsed = Number(value);
        if (!Number.isFinite(parsed)) return;
        setBenchmarks((prev) => {
          const next = { ...prev, [key]: parsed };
          syncBenchmarksToServer(next).catch(() => {});
          return next;
        });
        showToast('Benchmarks updated');
      }

      function resetDateFilter() {
        dateFilter = { from: null, to: null };
        setDateFilterInputs({ from: '', to: '' });
        setDateFilterError('');
      }

      function handleDateInputChange(key, value) {
        setDateFilterInputs((prev) => {
          if (key === 'from') {
            const next = { ...prev, from: value };
            if (value && prev.to && compareDateInputStrings(value, prev.to) > 0) {
              next.to = '';
              setDateFilterError('End date was cleared because it cannot be earlier than the selected start date.');
            } else {
              setDateFilterError('');
            }
            return next;
          }
          if (key === 'to') {
            if (value && prev.from && compareDateInputStrings(value, prev.from) < 0) {
              setDateFilterError('End date cannot be earlier than the start date.');
              return prev;
            }
            setDateFilterError('');
            return { ...prev, to: value };
          }
          setDateFilterError('');
          return prev;
        });
      }

      function handleSelectMonth(label) {
        setSelectedLabel(label);
        resetDateFilter();
      }

      function openModal(type, payload) {
        setModal({ type, payload });
      }

      function openUntagged() {
        setModal({ type: 'untagged' });
      }

      function clearSession() {
        clearSavedFiles();
        clearDatasetsOnServer().catch(() => {});
        setRawDatasets([]);
        setSelectedLabel('');
        resetDateFilter();
        setActiveTab('Overview');
        setModal(null);
        setPanelState(null);
        setUntaggedOnly(false);
        setRestoreBanner(null);
        setUploadMessage('');
        showToast('Session cleared');
      }

      const panelItem = panelState ? monthData?.panelItems?.[panelState.id] || null : null;

      function closePanel() {
        if (panelState?.sourcePopupId) {
          const sourcePopup = document.getElementById(panelState.sourcePopupId);
          if (sourcePopup) sourcePopup.scrollTop = panelState.scrollPos || 0;
        }
        setPanelState(null);
      }

      function openAdPanel(campaignId, sourcePopupId) {
        const sourcePopup = sourcePopupId ? document.getElementById(sourcePopupId) : null;
        const scrollPos = sourcePopup ? sourcePopup.scrollTop : 0;
        setPanelState({ id: campaignId, sourcePopupId, scrollPos });
      }

      useEffect(() => {
        if (!panelState) return undefined;
        const handleMouseDown = (event) => {
          const inPanel = event.target.closest('.side-panel');
          if (!inPanel) {
            closePanel();
          }
        };
        document.addEventListener('mousedown', handleMouseDown);
        return () => document.removeEventListener('mousedown', handleMouseDown);
      }, [panelState]);

      function closeModal() {
        setModal(null);
        setPanelState(null);
      }

      function renderModal() {
        if (!monthData || !modal) return null;
        if (modal.type === 'spend') return <SpendModal monthData={monthData} onClose={closeModal} openPanel={openAdPanel} onCopy={showToast} popupId="spend-popup" />;
        if (modal.type === 'campaigns') return <CampaignModal monthData={monthData} onClose={closeModal} popupId="campaigns-popup" />;
        if (modal.type === 'platform') {
          const platformCard = monthData.platformCards.find((item) => item.platform === modal.payload);
          return platformCard ? <PlatformDetailModal monthData={monthData} platformCard={platformCard} onClose={closeModal} openPanel={openAdPanel} onCopy={showToast} popupId="platform-popup" ctrBenchmark={benchmarks.ctr} /> : null;
        }
        if (modal.type === 'format') {
          const formatCard = monthData.formatCards.find((item) => item.bucket === modal.payload);
          return formatCard ? <FormatDetailModal monthData={monthData} formatCard={formatCard} onClose={closeModal} openPanel={openAdPanel} onCopy={showToast} popupId="format-popup" /> : null;
        }
        if (modal.type === 'page') {
          const pageCard = monthData.pageCards.find((item) => item.accountName === modal.payload);
          return pageCard ? <PageDetailModal pageCard={pageCard} onClose={closeModal} openPanel={openAdPanel} onCopy={showToast} popupId="page-popup" ctrBenchmark={benchmarks.ctr} /> : null;
        }
        if (modal.type === 'campaignDetail') {
          const campaignCard = monthData.campaignCards.find((item) => item.name === modal.payload);
          return campaignCard ? <CampaignDetailModal campaignCard={campaignCard} monthData={monthData} onClose={closeModal} openPanel={openAdPanel} onCopy={showToast} popupId="campaign-detail-popup" /> : null;
        }
        if (modal.type === 'pagesOverview') return <PagesOverviewModal monthData={monthData} onClose={closeModal} onOpenPage={(pageName) => setModal({ type: 'page', payload: pageName })} popupId="pages-overview-popup" />;
        if (modal.type === 'reach') return <MetricModal title="Total Reach Breakdown" subtitle={getPopupDescriptor('reach', { month: formatFullMonthLabel(monthData.month) })} metric="Reach" chartItems={monthData.platformBreakdown} momTable={monthData.reachMomTable} topRows={monthData.overviewData.topReach} bottomRows={monthData.overviewData.bottomReach} note="Includes ads from all objectives — Traffic, Engagement and Awareness" onClose={closeModal} openPanel={openAdPanel} onCopy={showToast} popupId="reach-popup" />;
        if (modal.type === 'impressions') return <MetricModal title="Total Impressions Breakdown" subtitle={getPopupDescriptor('impressions', { month: formatFullMonthLabel(monthData.month) })} metric="Impressions" chartItems={monthData.platformBreakdown} momTable={monthData.impressionsMomTable} topRows={monthData.overviewData.topImpressions} bottomRows={monthData.overviewData.bottomImpressions} note="Includes ads from all objectives — Traffic, Engagement and Awareness" onClose={closeModal} openPanel={openAdPanel} onCopy={showToast} popupId="impressions-popup" />;
        if (modal.type === 'creative') return <CreativeModal monthData={monthData} onClose={closeModal} openPanel={openAdPanel} onCopy={showToast} popupId="creative-popup" onOpenHelp={() => setModal({ type: 'creativeHow' })} />;
        if (modal.type === 'creativeHow') return <CreativeHowModal monthData={monthData} onClose={closeModal} />;
        if (modal.type === 'missed') return <MissedOpportunityModal monthData={monthData} onClose={closeModal} onCopy={showToast} openPanel={openAdPanel} popupId="missed-popup" onOpenHelp={() => setModal({ type: 'missedHow' })} />;
        if (modal.type === 'missedHow') return <MissedHowModal monthData={monthData} onClose={closeModal} />;
        if (modal.type === 'date') return <DateModal monthData={monthData} day={modal.payload} onClose={closeModal} openPanel={openAdPanel} onCopy={showToast} popupId="date-popup" />;
        if (modal.type === 'unknownDates') return <UnknownDatesModal monthData={monthData} onClose={closeModal} popupId="unknown-dates-popup" />;
        if (modal.type === 'untagged') return <UntaggedModal monthData={monthData} onClose={closeModal} onCopy={showToast} popupId="untagged-popup" />;
        return null;
      }

      if (isBooting) {
        return <div className="app-shell"></div>;
      }

      if (!dashboard.months.length) {
        return (
          <div className="app-shell">
            <input ref={fileInputRef} type="file" accept=".xlsx,.xls" multiple style={{ display: 'none' }} onChange={handleFiles} />
            <UploadScreen onTriggerUpload={triggerUpload} message={uploadMessage} />
            {toast ? <div className="toast">{toast}</div> : null}
          </div>
        );
      }

      return (
        <div className="app-shell">
          <input ref={fileInputRef} type="file" accept=".xlsx,.xls" multiple style={{ display: 'none' }} onChange={handleFiles} />
          <div className="dashboard-shell">
            <header className="header">
              <div className="header-row">
                <div className="brand"><img className="brand-logo" src="Amul-Logo.png" alt="Amul" /><div className="brand-divider">|</div><div className="brand-sub">{`Campaign Monitor — ${monthData ? formatFullMonthLabel(monthData.month) : ''}`}</div></div>
                <button className="subtle-button" onClick={triggerUpload}>↑ New Report</button>
              </div>
              <div className="header-row">
                <div className="month-row" style={{ flex: '1 1 auto' }}>
                  {dashboard.months.map((month) => <button key={month.label} className={`month-pill ${currentLabel === month.label ? 'active' : ''}`} onClick={() => handleSelectMonth(month.label)}>{month.label}</button>)}
                  {monthData?.untagged.length ? <button className="ungtagged" style={{ background: 'transparent', border: 0, padding: 0 }} onClick={openUntagged}><span className="dot"></span><span>{`${monthData.untagged.length} untagged`}</span></button> : null}
                </div>
                <div className="date-filter-shell">
                  <div className="date-filter-row">
                    <div className="date-filter-field">
                      <label className="filter-label">From</label>
                      <input className="date-filter-input" type="date" value={dateFilterInputs.from} max={dateFilterInputs.to || undefined} onChange={(e) => handleDateInputChange('from', e.target.value)} />
                    </div>
                    <div className="date-filter-field">
                      <label className="filter-label">To</label>
                      <input className="date-filter-input" type="date" value={dateFilterInputs.to} min={dateFilterInputs.from || undefined} onChange={(e) => handleDateInputChange('to', e.target.value)} />
                    </div>
                    {(dateFilterInputs.from || dateFilterInputs.to) ? <button className="date-filter-clear" onClick={resetDateFilter}>Clear</button> : null}
                  </div>
                  {dateFilterError ? <div className="date-filter-error">{dateFilterError}</div> : null}
                </div>
              </div>
              <div className="header-row">
                <div className="tab-row">
                  {tabs.map((tab) => <button key={tab} className={`tab-pill ${activeTab === tab ? 'active' : ''}`} onClick={() => setActiveTab(tab)}>{tab}</button>)}
                </div>
              </div>
            </header>
            {restoreBanner ? (
              <div className="restore-banner">
                <span>{restoreBanner.source === 'server'
                  ? `📡 Shared session: ${restoreBanner.labels.join(', ')} · Uploaded ${restoreBanner.savedAt ? restoreBanner.savedAt.toLocaleString() : 'recently'} · `
                  : `📁 Restored ${restoreBanner.labels.join(', ')} · Last saved ${restoreBanner.savedAt ? restoreBanner.savedAt.toLocaleString() : 'recently'} · `
                }</span>
                <span className="restore-banner-actions">
                  <button className="restore-link amber" onClick={triggerUpload}>Upload new files</button>
                  <button className="restore-link" onClick={clearSession}>Clear</button>
                </span>
              </div>
            ) : null}

            {activeTab === 'Overview' ? <OverviewTab monthData={monthData} currentLabel={currentLabel} onOpenModal={openModal} festivalEvents={festivalEventsState} festivalMarkerEnabled={festivalMarkerEnabled} onToggleFestivalMarkers={() => setFestivalMarkerEnabled((prev) => !prev)} /> : null}
            {activeTab === 'Platforms' ? <PlatformsTab monthData={monthData} onOpenModal={openModal} /> : null}
            {activeTab === 'Pages' ? <PagesTab monthData={monthData} onOpenModal={openModal} /> : null}
            {activeTab === 'Formats' ? <FormatsTab monthData={monthData} onOpenModal={openModal} /> : null}
            {activeTab === 'Campaigns' ? <CampaignsTab monthData={monthData} onOpenModal={openModal} /> : null}
            {placeholderTabs.has(activeTab) ? <PlaceholderTab name={activeTab} /> : null}
            {activeTab === 'Drill-down' ? <DrilldownTab data={monthData.drilldownData} untaggedOnly={untaggedOnly} clearUntagged={() => setUntaggedOnly(false)} onOpenPanel={(id) => openAdPanel(id)} onCopy={showToast} ctrBenchmark={benchmarks.ctr} /> : null}
            {activeTab === 'Inactive Ads' ? <InactiveAdsTab data={monthData.inactiveData} benchmarks={benchmarks} onCopy={showToast} onOpenPanel={(id) => openAdPanel(id)} /> : null}
            {activeTab === 'Benchmarks & Formulas' ? <BenchmarksTab benchmarks={benchmarks} onBenchmarkChange={onBenchmarkChange} monthData={monthData} festivalFetchError={festivalFetchError} userCalendarIds={userCalendarIds} setUserCalendarIds={setUserCalendarIds} festivalEditorEvents={festivalEditorEvents} userFestivalEvents={userFestivalEvents} setUserFestivalEvents={setUserFestivalEvents} hiddenFestivalEvents={hiddenFestivalEvents} setHiddenFestivalEvents={setHiddenFestivalEvents} /> : null}
          </div>

          {renderModal()}
          <SidePanel item={panelItem} onClose={closePanel} onCopy={showToast} />
          {toast ? <div className="toast">{toast}</div> : null}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
